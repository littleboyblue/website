<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <rect width="800" height="340" rx="12" fill="#0f0f1a"/>
  <text x="400" y="36" text-anchor="middle" fill="#06b6d4" font-size="16" font-family="sans-serif" font-weight="600">Agent Co-Creator 的四层架构</text>

  <!-- Layer 1: Harness -->
  <rect x="60" y="55" width="680" height="52" rx="8" fill="#0f172a" stroke="#38bdf8" stroke-width="1"/>
  <text x="85" y="78" fill="#38bdf8" font-size="13" font-weight="600">第一层</text>
  <text x="85" y="96" fill="#64748b" font-size="11">Harness 约束与安全</text>
  <text x="500" y="85" text-anchor="middle" fill="#94a3b8" font-size="11">调度 · 安全边界 · 资源管理 · 质量控制</text>

  <!-- Layer 2: Skills -->
  <rect x="60" y="115" width="680" height="52" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
  <text x="85" y="138" fill="#22d3ee" font-size="13" font-weight="600">第二层</text>
  <text x="85" y="156" fill="#64748b" font-size="11">Skill 可复用能力</text>
  <text x="500" y="145" text-anchor="middle" fill="#94a3b8" font-size="11">文生视频 · 图生视频 · 分镜生成 · 风格迁移 · 镜头控制</text>

  <!-- Layer 3: Model -->
  <rect x="60" y="175" width="680" height="52" rx="8" fill="#0f172a" stroke="#06b6d4" stroke-width="1"/>
  <text x="85" y="198" fill="#06b6d4" font-size="13" font-weight="600">第三层</text>
  <text x="85" y="216" fill="#64748b" font-size="11">底层模型</text>
  <text x="500" y="205" text-anchor="middle" fill="#94a3b8" font-size="11">视频生成大模型 · 全模态 · 世界模型 · LLM 推理</text>

  <!-- Layer 4: Workflow -->
  <rect x="60" y="235" width="680" height="52" rx="8" fill="#042f2e" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="85" y="258" fill="#2dd4bf" font-size="13" font-weight="600">第四层 ★</text>
  <text x="85" y="276" fill="#64748b" font-size="11">行业工作流</text>
  <text x="500" y="265" text-anchor="middle" fill="#99f6e4" font-size="11">分镜构思 → 试错迭代 → 版本对比 → 投放验证 → 数据反哺</text>

  <!-- Highlight box on Layer 4 -->
  <text x="400" y="315" text-anchor="middle" fill="#5eead4" font-size="12">★ 真正的护城河在第 3-4 层：行业定制 skill + 端到端工作流</text>
</svg>