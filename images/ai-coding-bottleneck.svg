<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="360" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">交付链条与瓶颈转移</text>

  <!-- Pipeline stages - Before AI -->
  <text x="400" y="58" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">引入 AI 前</text>

  <!-- Stage boxes: 需求→设计→编码→审查→测试→部署 -->
  <rect x="40"  y="70" width="105" height="36" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" filter="url(#sh)"/>
  <text x="92"  y="93" text-anchor="middle" font-size="11" fill="#475569">需求澄清</text>

  <line x1="145" y1="88" x2="158" y2="88" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="162" y="70" width="105" height="36" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" filter="url(#sh)"/>
  <text x="214" y="93" text-anchor="middle" font-size="11" fill="#475569">方案设计</text>

  <line x1="267" y1="88" x2="280" y2="88" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="284" y="70" width="105" height="36" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh)"/>
  <text x="336" y="93" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">编码</text>
  <text x="336" y="120" text-anchor="middle" font-size="9" fill="#b45309">← 瓶颈</text>

  <line x1="389" y1="88" x2="402" y2="88" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="406" y="70" width="105" height="36" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" filter="url(#sh)"/>
  <text x="458" y="93" text-anchor="middle" font-size="11" fill="#475569">代码审查</text>

  <line x1="511" y1="88" x2="524" y2="88" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="528" y="70" width="105" height="36" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" filter="url(#sh)"/>
  <text x="580" y="93" text-anchor="middle" font-size="11" fill="#475569">测试</text>

  <line x1="633" y1="88" x2="646" y2="88" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="650" y="70" width="105" height="36" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" filter="url(#sh)"/>
  <text x="702" y="93" text-anchor="middle" font-size="11" fill="#475569">部署</text>

  <!-- Pipeline stages - After AI -->
  <text x="400" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">引入 AI 后</text>

  <rect x="40"  y="180" width="105" height="36" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" filter="url(#sh)"/>
  <text x="92"  y="203" text-anchor="middle" font-size="11" fill="#475569">需求澄清</text>

  <line x1="145" y1="198" x2="158" y2="198" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="162" y="180" width="105" height="36" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" filter="url(#sh)"/>
  <text x="214" y="203" text-anchor="middle" font-size="11" fill="#475569">方案设计</text>

  <line x1="267" y1="198" x2="280" y2="198" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="284" y="180" width="105" height="36" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="336" y="203" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">编码</text>
  <text x="336" y="230" text-anchor="middle" font-size="9" fill="#16a34a">5x 提速 ✓</text>

  <line x1="389" y1="198" x2="402" y2="198" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="406" y="180" width="105" height="36" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" filter="url(#sh)"/>
  <text x="458" y="203" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">代码审查</text>
  <text x="458" y="230" text-anchor="middle" font-size="9" fill="#dc2626">← 新瓶颈</text>

  <line x1="511" y1="198" x2="524" y2="198" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="528" y="180" width="105" height="36" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" filter="url(#sh)"/>
  <text x="580" y="203" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">测试</text>
  <text x="580" y="230" text-anchor="middle" font-size="9" fill="#dc2626">← 更堵</text>

  <line x1="633" y1="198" x2="646" y2="198" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="650" y="180" width="105" height="36" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" filter="url(#sh)"/>
  <text x="702" y="203" text-anchor="middle" font-size="11" fill="#475569">部署</text>

  <!-- Bottom insight -->
  <rect x="120" y="260" width="560" height="80" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="400" y="285" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">约束理论：系统吞吐量由最慢环节决定</text>
  <text x="400" y="305" text-anchor="middle" font-size="11" fill="#64748b">编码快 5 倍，但审查和测试没有加速 → 瓶颈转移而非消除</text>
  <text x="400" y="325" text-anchor="middle" font-size="11" fill="#64748b">整体提速可能只有 1.2x，且下游环节变得更堵</text>
</svg>
