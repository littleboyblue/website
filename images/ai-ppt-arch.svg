<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="340" fill="#f8fafc" rx="8"/>

  <!-- Step 1: LLM -->
  <rect x="30" y="120" width="140" height="70" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="100" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#6d28d9">LLM</text>
  <text x="100" y="168" text-anchor="middle" font-size="11" fill="#7c3aed">生成大纲 JSON</text>

  <!-- Arrow 1→2 -->
  <line x1="170" y1="155" x2="210" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: HTML Templates -->
  <rect x="215" y="40" width="150" height="70" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="290" y="68" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8">HTML 模板</text>
  <text x="290" y="88" text-anchor="middle" font-size="11" fill="#2563eb">5-8 套布局</text>

  <!-- Arrow 2→3 (from template down to engine) -->
  <line x1="290" y1="110" x2="290" y2="118" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Template Engine -->
  <rect x="215" y="120" width="150" height="70" rx="10" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="290" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#0369a1">模板引擎</text>
  <text x="290" y="168" text-anchor="middle" font-size="11" fill="#0284c7">EJS / Handlebars</text>

  <!-- Arrow 3→HTML Preview -->
  <line x1="365" y1="155" x2="410" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: HTML Preview -->
  <rect x="415" y="120" width="140" height="70" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="485" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d">HTML 预览</text>
  <text x="485" y="168" text-anchor="middle" font-size="11" fill="#16a34a">排版验证</text>

  <!-- Arrow from JSON down to PptxGenJS -->
  <line x1="100" y1="190" x2="100" y2="230" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Horizontal line from JSON area to PptxGenJS -->
  <line x1="100" y1="250" x2="215" y2="250" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: PptxGenJS -->
  <rect x="220" y="220" width="150" height="70" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="295" y="248" text-anchor="middle" font-size="13" font-weight="600" fill="#b45309">PptxGenJS</text>
  <text x="295" y="268" text-anchor="middle" font-size="11" fill="#d97706">原生生成</text>

  <!-- Arrow 5→PPTX -->
  <line x1="370" y1="255" x2="410" y2="255" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6: PPTX Output -->
  <rect x="415" y="220" width="140" height="70" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="485" y="248" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">PPTX 输出</text>
  <text x="485" y="268" text-anchor="middle" font-size="11" fill="#ef4444">可编辑</text>

  <!-- JSON data source annotation -->
  <rect x="580" y="120" width="190" height="170" rx="8" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="675" y="145" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">共享数据源</text>
  <text x="675" y="163" text-anchor="middle" font-size="10" fill="#94a3b8">outline.json</text>

  <!-- Dashed lines from JSON source to HTML preview and PptxGenJS -->
  <line x1="580" y1="155" x2="555" y2="155" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="580" y1="255" x2="555" y2="255" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Key insight labels -->
  <text x="485" y="210" text-anchor="middle" font-size="9" fill="#16a34a">仅预览，不输出</text>
  <text x="485" y="310" text-anchor="middle" font-size="9" fill="#ef4444">跳过 DOM 解析</text>

  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">AI 生成 PPT 架构流程</text>
</svg>
