<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" fill="none">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="280" rx="12" fill="url(#bg4)"/>
  <text x="400" y="34" text-anchor="middle" fill="#ec4899" font-size="15" font-family="sans-serif" font-weight="600">Claude 的人格训练：比代码能力更难量化，却更关键</text>

  <!-- Three pillars -->
  <!-- Left: 信念与价值观 -->
  <rect x="40" y="60" width="225" height="120" rx="8" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1"/>
  <text x="152" y="88" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">🧭 信念与价值观</text>
  <text x="152" y="110" text-anchor="middle" fill="#94a3b8" font-size="11">Claude 应该拥有什么信念？</text>
  <text x="152" y="128" text-anchor="middle" fill="#94a3b8" font-size="11">它应该坚持什么价值观？</text>
  <text x="152" y="146" text-anchor="middle" fill="#94a3b8" font-size="11">在什么情境下拒绝或反驳用户？</text>
  <text x="152" y="168" text-anchor="middle" fill="#818cf8" font-size="10">不走"一味讨好"路线</text>

  <!-- Center: 评估方法 -->
  <rect x="288" y="60" width="225" height="120" rx="8" fill="#1e1b4b" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="88" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="600">📊 双重评估</text>
  <text x="400" y="110" text-anchor="middle" fill="#94a3b8" font-size="11">量化：让 Claude 分析自己的输出</text>
  <text x="400" y="128" text-anchor="middle" fill="#94a3b8" font-size="11">直觉：研究员大量阅读对话记录</text>
  <text x="400" y="146" text-anchor="middle" fill="#94a3b8" font-size="11">→ 培养"手感判断"</text>
  <text x="400" y="168" text-anchor="middle" fill="#f59e0b" font-size="10">量化 + 直觉 缺一不可</text>

  <!-- Right: 长期信任 -->
  <rect x="535" y="60" width="225" height="120" rx="8" fill="#1e1b4b" stroke="#22d3ee" stroke-width="1"/>
  <text x="647" y="88" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="600">🤝 长期信任</text>
  <text x="647" y="110" text-anchor="middle" fill="#94a3b8" font-size="11">Agent 独立运行时间越来越长</text>
  <text x="647" y="128" text-anchor="middle" fill="#94a3b8" font-size="11">判断边界决定是否可信</text>
  <text x="647" y="146" text-anchor="middle" fill="#94a3b8" font-size="11">代码 · 架构 · 系统设计</text>
  <text x="647" y="168" text-anchor="middle" fill="#22d3ee" font-size="10">"品格"比"会写代码"重要</text>

  <!-- Bottom: key insight -->
  <text x="400" y="230" text-anchor="middle" fill="#64748b" font-size="12">核心理念：模型的人格不是偶然形成的——它是 Anthropic 专门团队系统化训练的结果</text>
  <text x="400" y="258" text-anchor="middle" fill="#475569" font-size="11">当 Agent 在你睡觉时独立编写代码、设计架构、做出选择——它的人格就是它的"职业操守"</text>
</svg>