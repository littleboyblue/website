<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#22d3ee"/>
    </marker>
  </defs>
  <rect width="800" height="340" rx="12" fill="url(#bg)"/>
  <text x="400" y="34" text-anchor="middle" fill="#2dd4bf" font-size="15" font-family="sans-serif" font-weight="600">AI 产品 PMF 验证：五步验证法</text>

  <!-- Step 1 -->
  <rect x="30" y="55" width="135" height="90" rx="8" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1"/>
  <text x="97" y="78" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Step 1</text>
  <text x="97" y="96" text-anchor="middle" fill="#e2e8f0" font-size="11">锁定一个</text>
  <text x="97" y="112" text-anchor="middle" fill="#e2e8f0" font-size="11">具体场景</text>
  <text x="97" y="132" text-anchor="middle" fill="#818cf8" font-size="9">❌ "帮程序员"</text>
  <text x="97" y="144" text-anchor="middle" fill="#22d3ee" font-size="9">✓ "写单元测试"</text>

  <!-- Arrow 1→2 -->
  <line x1="165" y1="100" x2="190" y2="100" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrR)"/>

  <!-- Step 2 -->
  <rect x="200" y="55" width="135" height="90" rx="8" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1"/>
  <text x="267" y="78" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Step 2</text>
  <text x="267" y="96" text-anchor="middle" fill="#e2e8f0" font-size="11">找到 10 个</text>
  <text x="267" y="112" text-anchor="middle" fill="#e2e8f0" font-size="11">重度用户</text>
  <text x="267" y="132" text-anchor="middle" fill="#64748b" font-size="9">深度访谈 +</text>
  <text x="267" y="144" text-anchor="middle" fill="#64748b" font-size="9">观察工作流</text>

  <!-- Arrow 2→3 -->
  <line x1="335" y1="100" x2="360" y2="100" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrR)"/>

  <!-- Step 3 -->
  <rect x="370" y="55" width="135" height="90" rx="8" fill="#1e1b4b" stroke="#f59e0b" stroke-width="1"/>
  <text x="437" y="78" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="600">Step 3 ★</text>
  <text x="437" y="96" text-anchor="middle" fill="#e2e8f0" font-size="11">验证用户是否</text>
  <text x="437" y="112" text-anchor="middle" fill="#e2e8f0" font-size="11">改变行为</text>
  <text x="437" y="132" text-anchor="middle" fill="#64748b" font-size="9">不用 AI 就难受？</text>
  <text x="437" y="144" text-anchor="middle" fill="#64748b" font-size="9">回到旧工具就烦？</text>

  <!-- Arrow 3→4 -->
  <line x1="505" y1="100" x2="530" y2="100" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrR)"/>

  <!-- Step 4 -->
  <rect x="540" y="55" width="135" height="90" rx="8" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1"/>
  <text x="607" y="78" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Step 4</text>
  <text x="607" y="96" text-anchor="middle" fill="#e2e8f0" font-size="11">测试付费</text>
  <text x="607" y="112" text-anchor="middle" fill="#e2e8f0" font-size="11">意愿</text>
  <text x="607" y="132" text-anchor="middle" fill="#64748b" font-size="9">预付费 / 订阅 /</text>
  <text x="607" y="144" text-anchor="middle" fill="#64748b" font-size="9">按量付费</text>

  <!-- Arrow 4→5 -->
  <line x1="675" y1="100" x2="700" y2="100" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrR)"/>

  <!-- Step 5 -->
  <rect x="710" y="55" width="70" height="90" rx="8" fill="#042f2e" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="745" y="82" text-anchor="middle" fill="#99f6e4" font-size="12" font-weight="600">Step 5</text>
  <text x="745" y="102" text-anchor="middle" fill="#e2e8f0" font-size="11">观察</text>
  <text x="745" y="118" text-anchor="middle" fill="#e2e8f0" font-size="11">自然增长</text>
  <text x="745" y="138" text-anchor="middle" fill="#2dd4bf" font-size="9">🎉 PMF!</text>

  <!-- Go/No-Go checkpoints -->
  <rect x="30" y="170" width="750" height="145" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="400" y="192" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">每个步骤的 Go / No-Go 检查点</text>

  <!-- Checkpoints -->
  <text x="50" y="218" fill="#64748b" font-size="10">Step 1 → 场景是否窄到能用一句话讲清？</text>
  <text x="50" y="234" fill="#22d3ee" font-size="10">✓ Go: "帮前端写 React 单元测试"  ❌ No-Go: "帮程序员提高效率"</text>

  <text x="50" y="254" fill="#64748b" font-size="10">Step 2 → 用户是否愿意每周花 &gt;3 小时在你的产品上？</text>
  <text x="50" y="270" fill="#22d3ee" font-size="10">✓ Go: 用户主动反馈 bug 和建议  ❌ No-Go: 礼貌性试用后沉默</text>

  <text x="50" y="290" fill="#64748b" font-size="10">Step 3 → 如果明天关掉产品，用户会不会骂你？</text>
  <text x="50" y="306" fill="#22d3ee" font-size="10">✓ Go: 用户说"别关，我现在离不开"  ❌ No-Go: "哦，那换个工具也行"</text>
</svg>