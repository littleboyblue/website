<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" rx="12" fill="url(#bg)"/>
  <text x="400" y="38" text-anchor="middle" fill="#ec4899" font-size="15" font-family="sans-serif" font-weight="600">AI 产品的五大 PMF 幻觉：你在哪个象限？</text>

  <!-- Radar chart axes -->
  <g transform="translate(400, 220)">
    <!-- Pentagon background -->
    <polygon points="0,-120 114,-37 71,97 -71,97 -114,-37" fill="none" stroke="#334155" stroke-width="0.5"/>
    <polygon points="0,-88 83,-27 52,71 -52,71 -83,-27" fill="none" stroke="#334155" stroke-width="0.5"/>
    <polygon points="0,-55 52,-17 33,45 -33,45 -52,-17" fill="none" stroke="#334155" stroke-width="0.5"/>

    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="-130" stroke="#475569" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="124" y2="-40" stroke="#475569" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="77" y2="106" stroke="#475569" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="-77" y2="106" stroke="#475569" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="-124" y2="-40" stroke="#475569" stroke-width="0.5"/>

    <!-- Labels — position beyond axis endpoints to avoid overlap -->
    <text x="0" y="-145" text-anchor="middle" fill="#a78bfa" font-size="12">Demo 幻觉</text>
    <text x="0" y="-160" text-anchor="middle" fill="#64748b" font-size="10">"发布会很炸"</text>

    <text x="140" y="-44" text-anchor="start" fill="#a78bfa" font-size="12">参数竞赛</text>
    <text x="140" y="-28" text-anchor="start" fill="#64748b" font-size="10">"我们用了 70B"</text>

    <text x="92" y="120" text-anchor="start" fill="#a78bfa" font-size="12">功能堆砌</text>
    <text x="92" y="136" text-anchor="start" fill="#64748b" font-size="10">"什么都能做"</text>

    <text x="-92" y="120" text-anchor="end" fill="#a78bfa" font-size="12">技术自嗨</text>
    <text x="-92" y="136" text-anchor="end" fill="#64748b" font-size="10">"这个 trick 很酷"</text>

    <text x="-140" y="-44" text-anchor="end" fill="#a78bfa" font-size="12">伪需求</text>
    <text x="-140" y="-28" text-anchor="end" fill="#64748b" font-size="10">"创始人自己需要"</text>

    <!-- Danger zone polygon -->
    <polygon points="0,-100 95,-30 59,80 -59,80 -95,-30" fill="rgba(239,68,68,0.08)" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 2"/>

    <!-- Safe zone center -->
    <circle cx="0" cy="0" r="22" fill="rgba(45,212,191,0.1)" stroke="#2dd4bf" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" fill="#2dd4bf" font-size="11" font-weight="600">PMF</text>
  </g>

  <!-- Bottom description -->
  <text x="400" y="430" text-anchor="middle" fill="#64748b" font-size="12">危险区：五个幻觉离中心越远，离 PMF 越远 · 安全区：用户价值才是唯一中心</text>
  <text x="400" y="455" text-anchor="middle" fill="#475569" font-size="11">案例：Jasper AI 从估值 15 亿美元到裁员——五个幻觉踩了至少三个</text>
</svg>