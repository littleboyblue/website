<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="340" rx="12" fill="url(#bg)"/>
  <text x="400" y="34" text-anchor="middle" fill="#ec4899" font-size="15" font-family="sans-serif" font-weight="600">AI 产品的五大 PMF 幻觉：你在哪个象限？</text>

  <!-- Radar chart axes -->
  <g transform="translate(400, 170)">
    <!-- Pentagon background -->
    <polygon points="0,-110 104,-34 65,89 -65,89 -104,-34" fill="none" stroke="#334155" stroke-width="0.5"/>
    <polygon points="0,-80 76,-25 47,64 -47,64 -76,-25" fill="none" stroke="#334155" stroke-width="0.5"/>
    <polygon points="0,-50 47,-15 29,40 -29,40 -47,-15" fill="none" stroke="#334155" stroke-width="0.5"/>

    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="-120" stroke="#475569" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="114" y2="-37" stroke="#475569" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="71" y2="97" stroke="#475569" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="-71" y2="97" stroke="#475569" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="-114" y2="-37" stroke="#475569" stroke-width="0.5"/>

    <!-- Labels -->
    <text x="0" y="-130" text-anchor="middle" fill="#a78bfa" font-size="11">Demo 幻觉</text>
    <text x="0" y="-142" text-anchor="middle" fill="#64748b" font-size="9">"发布会很炸"</text>

    <text x="130" y="-40" text-anchor="start" fill="#a78bfa" font-size="11">参数竞赛</text>
    <text x="130" y="-28" text-anchor="start" fill="#64748b" font-size="9">"我们用了 70B"</text>

    <text x="85" y="110" text-anchor="start" fill="#a78bfa" font-size="11">功能堆砌</text>
    <text x="85" y="122" text-anchor="start" fill="#64748b" font-size="9">"什么都能做"</text>

    <text x="-85" y="110" text-anchor="end" fill="#a78bfa" font-size="11">技术自嗨</text>
    <text x="-85" y="122" text-anchor="end" fill="#64748b" font-size="9">"这个 trick 很酷"</text>

    <text x="-130" y="-40" text-anchor="end" fill="#a78bfa" font-size="11">伪需求</text>
    <text x="-130" y="-28" text-anchor="end" fill="#64748b" font-size="9">"创始人自己需要"</text>

    <!-- Danger zone polygon -->
    <polygon points="0,-100 95,-30 59,80 -59,80 -95,-30" fill="rgba(239,68,68,0.08)" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 2"/>

    <!-- Safe zone center -->
    <circle cx="0" cy="0" r="20" fill="rgba(45,212,191,0.1)" stroke="#2dd4bf" stroke-width="1.5"/>
    <text x="0" y="4" text-anchor="middle" fill="#2dd4bf" font-size="10" font-weight="600">PMF</text>
  </g>

  <!-- Bottom description -->
  <text x="400" y="300" text-anchor="middle" fill="#64748b" font-size="12">危险区：五个幻觉离中心越远，离 PMF 越远 · 安全区：用户价值才是唯一中心</text>
  <text x="400" y="322" text-anchor="middle" fill="#475569" font-size="11">案例：Jasper AI 从估值 15 亿美元到裁员——五个幻觉踩了至少三个</text>
</svg>