<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="280" rx="12" fill="url(#bg)"/>
  <text x="400" y="34" text-anchor="middle" fill="#22d3ee" font-size="15" font-family="sans-serif" font-weight="600">验证 PMF 的三个信号：AI 产品的合理阈值</text>

  <!-- Gauge 1: 留存曲线 -->
  <g transform="translate(160, 140)">
    <path d="M-70,50 A80,80 0 1,1 70,50" fill="none" stroke="#1e293b" stroke-width="12" stroke-linecap="round"/>
    <path d="M-70,50 A80,80 0 1,1 0,-80" fill="none" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>
    <text x="0" y="-20" text-anchor="middle" fill="#67e8f9" font-size="22" font-weight="700">&gt;30%</text>
    <text x="0" y="0" text-anchor="middle" fill="#94a3b8" font-size="11">30 日留存率</text>
    <text x="0" y="75" text-anchor="middle" fill="#64748b" font-size="10">AI 产品及格线</text>
  </g>

  <!-- Gauge 2: 付费意愿 -->
  <g transform="translate(400, 140)">
    <path d="M-70,50 A80,80 0 1,1 70,50" fill="none" stroke="#1e293b" stroke-width="12" stroke-linecap="round"/>
    <path d="M-70,50 A80,80 0 1,1 35,-60" fill="none" stroke="#f59e0b" stroke-width="12" stroke-linecap="round"/>
    <text x="0" y="-20" text-anchor="middle" fill="#fcd34d" font-size="22" font-weight="700">&gt;5%</text>
    <text x="0" y="0" text-anchor="middle" fill="#94a3b8" font-size="11">付费转化率</text>
    <text x="0" y="75" text-anchor="middle" fill="#64748b" font-size="10">免费→付费关键跃迁</text>
  </g>

  <!-- Gauge 3: 自然增长 -->
  <g transform="translate(640, 140)">
    <path d="M-70,50 A80,80 0 1,1 70,50" fill="none" stroke="#1e293b" stroke-width="12" stroke-linecap="round"/>
    <path d="M-70,50 A80,80 0 1,1 55,-45" fill="none" stroke="#a78bfa" stroke-width="12" stroke-linecap="round"/>
    <text x="0" y="-20" text-anchor="middle" fill="#c4b5fd" font-size="22" font-weight="700">&gt;30%</text>
    <text x="0" y="0" text-anchor="middle" fill="#94a3b8" font-size="11">口碑/自然增长占比</text>
    <text x="0" y="75" text-anchor="middle" fill="#64748b" font-size="10">脱离烧钱的关键指标</text>
  </g>

  <!-- Bottom note -->
  <text x="400" y="255" text-anchor="middle" fill="#64748b" font-size="12">Cursor 案例：VS Code 插件形态让三个指标同时达标——留存高、付费顺、口碑自发传播</text>
</svg>