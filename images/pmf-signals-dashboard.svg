<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" rx="12" fill="url(#bg)"/>
  <text x="400" y="38" text-anchor="middle" fill="#22d3ee" font-size="15" font-family="sans-serif" font-weight="600">验证 PMF 的三个信号：AI 产品的合理阈值</text>

  <!-- Gauge 1: 留存曲线 (30%) -->
  <g transform="translate(160, 155)">
    <!-- Background arc: upper semicircle, sweep=1 (clockwise) -->
    <path d="M-75,0 A 75,75 0 0,1 75,0" fill="none" stroke="#1e293b" stroke-width="12" stroke-linecap="round"/>
    <!-- Progress arc: 30% = 54deg, sweep=1 -->
    <path d="M-75,0 A 75,75 0 0,1 -44.09,-60.68" fill="none" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>
    <text x="0" y="-18" text-anchor="middle" fill="#67e8f9" font-size="22" font-weight="700">&gt;30%</text>
    <text x="0" y="2" text-anchor="middle" fill="#94a3b8" font-size="11">30 日留存率</text>
    <text x="0" y="78" text-anchor="middle" fill="#64748b" font-size="10">AI 产品及格线</text>
  </g>

  <!-- Gauge 2: 付费意愿 (5%) -->
  <g transform="translate(400, 155)">
    <!-- Background arc -->
    <path d="M-75,0 A 75,75 0 0,1 75,0" fill="none" stroke="#1e293b" stroke-width="12" stroke-linecap="round"/>
    <!-- Progress arc: 5% = 9deg, sweep=1 -->
    <path d="M-75,0 A 75,75 0 0,1 -74.08,-11.73" fill="none" stroke="#f59e0b" stroke-width="12" stroke-linecap="round"/>
    <text x="0" y="-18" text-anchor="middle" fill="#fcd34d" font-size="22" font-weight="700">&gt;5%</text>
    <text x="0" y="2" text-anchor="middle" fill="#94a3b8" font-size="11">付费转化率</text>
    <text x="0" y="78" text-anchor="middle" fill="#64748b" font-size="10">免费→付费关键跃迁</text>
  </g>

  <!-- Gauge 3: 自然增长 (30%) -->
  <g transform="translate(640, 155)">
    <!-- Background arc -->
    <path d="M-75,0 A 75,75 0 0,1 75,0" fill="none" stroke="#1e293b" stroke-width="12" stroke-linecap="round"/>
    <!-- Progress arc: 30% = 54deg, sweep=1 -->
    <path d="M-75,0 A 75,75 0 0,1 -44.09,-60.68" fill="none" stroke="#a78bfa" stroke-width="12" stroke-linecap="round"/>
    <text x="0" y="-18" text-anchor="middle" fill="#c4b5fd" font-size="22" font-weight="700">&gt;30%</text>
    <text x="0" y="2" text-anchor="middle" fill="#94a3b8" font-size="11">口碑/自然增长占比</text>
    <text x="0" y="78" text-anchor="middle" fill="#64748b" font-size="10">脱离烧钱的关键指标</text>
  </g>

  <!-- Bottom note -->
  <text x="400" y="275" text-anchor="middle" fill="#64748b" font-size="12">Cursor 案例：VS Code 插件形态让三个指标同时达标——留存高、付费顺、口碑自发传播</text>
</svg>