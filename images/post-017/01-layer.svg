<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" rx="12" fill="url(#bg)"/>
  <text x="400" y="36" text-anchor="middle" fill="#a78bfa" font-size="15" font-family="sans-serif" font-weight="600">企业级 RAG 可靠性栈：不是替代，而是组合</text>

  <rect x="40" y="64" width="720" height="44" rx="8" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="72" y="88" fill="#c4b5fd" font-size="12" font-weight="600">LLM 编排</text>
  <text x="192" y="88" fill="#e2e8f0" font-size="11">意图识别 · 查询规划 · 结果整合 · 答案表达</text>
  <text x="728" y="88" text-anchor="end" fill="#64748b" font-size="10">语言层</text>

  <rect x="40" y="116" width="720" height="44" rx="8" fill="#1c1917" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="72" y="140" fill="#fcd34d" font-size="12" font-weight="600">领域 Schema</text>
  <text x="192" y="140" fill="#e2e8f0" font-size="11">实体类型 · 关系语义 · 证据等级 · 推理边界</text>
  <text x="728" y="140" text-anchor="end" fill="#64748b" font-size="10">约束层</text>

  <rect x="40" y="168" width="720" height="44" rx="8" fill="#042f2e" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="72" y="192" fill="#99f6e4" font-size="12" font-weight="600">知识图谱</text>
  <text x="192" y="192" fill="#e2e8f0" font-size="11">多实体关联 · 多跳推理 · 因果链路 · 风险校验</text>
  <text x="728" y="192" text-anchor="end" fill="#64748b" font-size="10">关系层</text>

  <rect x="40" y="220" width="720" height="44" rx="8" fill="#1e1b4b" stroke="#334155" stroke-width="1"/>
  <text x="72" y="244" fill="#c4b5fd" font-size="12" font-weight="600">关键规则</text>
  <text x="192" y="244" fill="#e2e8f0" font-size="11">例外条款 · 禁忌条件 · 审批规则 · 人工复核</text>
  <text x="728" y="244" text-anchor="end" fill="#64748b" font-size="10">确定层</text>

  <rect x="40" y="272" width="720" height="44" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="72" y="296" fill="#22d3ee" font-size="12" font-weight="600">混合检索</text>
  <text x="192" y="296" fill="#e2e8f0" font-size="11">关键词 · 向量 · 重排 · 元数据 · 原文引用</text>
  <text x="728" y="296" text-anchor="end" fill="#64748b" font-size="10">召回层</text>

  <rect x="40" y="324" width="720" height="44" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="72" y="348" fill="#94a3b8" font-size="12" font-weight="600">文档治理</text>
  <text x="192" y="348" fill="#e2e8f0" font-size="11">清洗 · 切分 · 标题层级 · 表格结构 · 持续更新</text>
  <text x="728" y="348" text-anchor="end" fill="#64748b" font-size="10">基础层</text>

  <text x="400" y="388" text-anchor="middle" fill="#64748b" font-size="10">可靠性来自多层组合：相似召回解决入口，Schema 和规则定义边界，图谱处理关系，LLM 负责表达</text>
</svg>
