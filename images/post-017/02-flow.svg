<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#22d3ee"/>
    </marker>
  </defs>
  <rect width="800" height="400" rx="12" fill="url(#bg)"/>
  <text x="400" y="36" text-anchor="middle" fill="#2dd4bf" font-size="15" font-family="sans-serif" font-weight="600">企业 RAG 落地五阶段：从基础召回到可审计答案</text>

  <rect x="24" y="64" width="128" height="112" rx="8" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1"/>
  <text x="88" y="92" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Step 1</text>
  <text x="88" y="116" text-anchor="middle" fill="#e2e8f0" font-size="11">先做好</text>
  <text x="88" y="132" text-anchor="middle" fill="#e2e8f0" font-size="11">基础 RAG</text>
  <text x="88" y="156" text-anchor="middle" fill="#64748b" font-size="9">切分 · 重排 · 引用</text>

  <line x1="152" y1="120" x2="172" y2="120" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="176" y="64" width="128" height="112" rx="8" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1"/>
  <text x="240" y="92" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Step 2</text>
  <text x="240" y="116" text-anchor="middle" fill="#e2e8f0" font-size="11">结构化</text>
  <text x="240" y="132" text-anchor="middle" fill="#e2e8f0" font-size="11">关键规则</text>
  <text x="240" y="156" text-anchor="middle" fill="#64748b" font-size="9">例外 · 禁忌 · 条件</text>

  <line x1="304" y1="120" x2="324" y2="120" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="328" y="64" width="128" height="112" rx="8" fill="#042f2e" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="392" y="92" text-anchor="middle" fill="#99f6e4" font-size="12" font-weight="600">Step 3</text>
  <text x="392" y="116" text-anchor="middle" fill="#e2e8f0" font-size="11">建设轻量</text>
  <text x="392" y="132" text-anchor="middle" fill="#e2e8f0" font-size="11">知识图谱</text>
  <text x="392" y="156" text-anchor="middle" fill="#2dd4bf" font-size="9">关系 · 多跳 · 溯源</text>

  <line x1="456" y1="120" x2="476" y2="120" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="480" y="64" width="128" height="112" rx="8" fill="#1c1917" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="544" y="92" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="600">Step 4</text>
  <text x="544" y="116" text-anchor="middle" fill="#e2e8f0" font-size="11">定义领域</text>
  <text x="544" y="132" text-anchor="middle" fill="#e2e8f0" font-size="11">Schema</text>
  <text x="544" y="156" text-anchor="middle" fill="#f59e0b" font-size="9">边界 · 等级 · 复核</text>

  <line x1="608" y1="120" x2="628" y2="120" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="632" y="64" width="144" height="112" rx="8" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1"/>
  <text x="704" y="92" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Step 5</text>
  <text x="704" y="116" text-anchor="middle" fill="#e2e8f0" font-size="11">让 LLM</text>
  <text x="704" y="132" text-anchor="middle" fill="#e2e8f0" font-size="11">理解与表达</text>
  <text x="704" y="156" text-anchor="middle" fill="#64748b" font-size="9">不独断高风险结论</text>

  <rect x="24" y="216" width="752" height="132" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="400" y="244" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">最终运行链路</text>
  <text x="64" y="280" fill="#64748b" font-size="10">用户问题 → 意图识别 → 查询路由 → 关键词 / 向量 / 图谱 / 规则混合检索</text>
  <text x="64" y="304" fill="#22d3ee" font-size="10">证据聚合 → 置信度校验 → LLM 生成答案 → 输出证据链</text>
  <text x="64" y="328" fill="#f59e0b" font-size="10">低置信或高风险问题 → 人工复核，而不是让模型独自决定</text>

  <text x="400" y="380" text-anchor="middle" fill="#64748b" font-size="10">从小范围、高风险、强规则场景切入，比一开始建设“大而全图谱”更现实</text>
</svg>
