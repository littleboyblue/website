<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">知识库治理闭环</title>
  <desc id="desc">从知识来源治理、内容加工、元数据版本、混合检索到答案控制、评估反馈、运营机制和边界重校准的闭环流程。</desc>
  <defs>
    <style>
      :root {
        --bg: #f8f9fa;
        --panel: #ffffff;
        --node: #f9fafb;
        --node-focus: #ccfbf1;
        --node-warn: #fff7ed;
        --border: #e5e7eb;
        --text: #1f2937;
        --muted: #6b7280;
        --purple: #6d28d9;
        --cyan: #0891b2;
        --orange: #d97706;
        --teal: #0d9488;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f0f1a;
          --panel: #111827;
          --node: #1c1917;
          --node-focus: #042f2e;
          --node-warn: #2a1808;
          --border: #334155;
          --text: #e2e8f0;
          --muted: #94a3b8;
          --purple: #a78bfa;
          --cyan: #22d3ee;
          --orange: #f59e0b;
          --teal: #2dd4bf;
        }
      }
      text { font-family: sans-serif; }
      .title { fill: var(--purple); font-size: 15px; font-weight: 600; }
      .subtitle { fill: var(--muted); font-size: 11px; }
      .node { fill: var(--node); stroke: var(--border); stroke-width: 1; }
      .focus { fill: var(--node-focus); stroke: var(--teal); stroke-width: 1.5; }
      .warn { fill: var(--node-warn); stroke: var(--orange); stroke-width: 1.5; }
      .name { fill: var(--text); font-size: 13px; font-weight: 600; }
      .meta { fill: var(--muted); font-size: 11px; }
      .tag { fill: var(--orange); font-size: 10px; font-weight: 600; }
      .arrow { stroke: var(--cyan); stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .note { fill: var(--panel); stroke: var(--border); stroke-width: 1; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="var(--cyan)" />
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="400" rx="12" fill="var(--bg)" />
  <text x="400" y="32" text-anchor="middle" class="title">知识库治理闭环：不是上传文档，而是持续运营</text>
  <text x="400" y="56" text-anchor="middle" class="subtitle">权威来源、内容质量、权限版本、检索召回、答案控制和评估反馈要一起治理</text>

  <rect x="40" y="88" width="152" height="72" rx="8" class="focus" />
  <text x="116" y="112" text-anchor="middle" class="tag">01</text>
  <text x="116" y="132" text-anchor="middle" class="name">来源治理</text>
  <text x="116" y="148" text-anchor="middle" class="meta">权威源 / Owner</text>

  <rect x="224" y="88" width="152" height="72" rx="8" class="node" />
  <text x="300" y="112" text-anchor="middle" class="tag">02</text>
  <text x="300" y="132" text-anchor="middle" class="name">内容加工</text>
  <text x="300" y="148" text-anchor="middle" class="meta">清洗 / 切块 / 去重</text>

  <rect x="408" y="88" width="152" height="72" rx="8" class="node" />
  <text x="484" y="112" text-anchor="middle" class="tag">03</text>
  <text x="484" y="132" text-anchor="middle" class="name">元数据版本</text>
  <text x="484" y="148" text-anchor="middle" class="meta">权限 / 生效期 / 风险</text>

  <rect x="592" y="88" width="152" height="72" rx="8" class="node" />
  <text x="668" y="112" text-anchor="middle" class="tag">04</text>
  <text x="668" y="132" text-anchor="middle" class="name">混合检索</text>
  <text x="668" y="148" text-anchor="middle" class="meta">向量 / 关键词 / 重排</text>

  <line x1="192" y1="124" x2="224" y2="124" class="arrow" />
  <line x1="376" y1="124" x2="408" y2="124" class="arrow" />
  <line x1="560" y1="124" x2="592" y2="124" class="arrow" />
  <line x1="668" y1="160" x2="668" y2="220" class="arrow" />

  <rect x="592" y="220" width="152" height="72" rx="8" class="warn" />
  <text x="668" y="244" text-anchor="middle" class="tag">05</text>
  <text x="668" y="264" text-anchor="middle" class="name">答案控制</text>
  <text x="668" y="280" text-anchor="middle" class="meta">引用 / 拒答 / 转人工</text>

  <rect x="408" y="220" width="152" height="72" rx="8" class="node" />
  <text x="484" y="244" text-anchor="middle" class="tag">06</text>
  <text x="484" y="264" text-anchor="middle" class="name">评估反馈</text>
  <text x="484" y="280" text-anchor="middle" class="meta">命中率 / 幻觉率</text>

  <rect x="224" y="220" width="152" height="72" rx="8" class="node" />
  <text x="300" y="244" text-anchor="middle" class="tag">07</text>
  <text x="300" y="264" text-anchor="middle" class="name">运营机制</text>
  <text x="300" y="280" text-anchor="middle" class="meta">审核 / 发布 / 下线</text>

  <rect x="40" y="220" width="152" height="72" rx="8" class="focus" />
  <text x="116" y="244" text-anchor="middle" class="tag">08</text>
  <text x="116" y="264" text-anchor="middle" class="name">边界重校准</text>
  <text x="116" y="280" text-anchor="middle" class="meta">问题域 / 风险域</text>

  <line x1="592" y1="256" x2="560" y2="256" class="arrow" />
  <line x1="408" y1="256" x2="376" y2="256" class="arrow" />
  <line x1="224" y1="256" x2="192" y2="256" class="arrow" />
  <line x1="116" y1="220" x2="116" y2="160" class="arrow" />

  <rect x="40" y="328" width="720" height="40" rx="8" class="note" />
  <text x="400" y="352" text-anchor="middle" class="meta">治理目标：让每个答案都能追溯来源、匹配权限、识别风险，并通过反馈持续修正知识库</text>
</svg>
