<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="skillGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="clawGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="autoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="kbGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="platformGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="centerShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3b82f6" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="800" height="520" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" font-family="system-ui, sans-serif">WorkBuddy 核心架构</text>
  <text x="400" y="58" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="system-ui, sans-serif">一句话任务 → 自主规划 → 多能力协同 → 可验收交付</text>

  <!-- Center: WorkBuddy Engine -->
  <circle cx="400" cy="280" r="62" fill="url(#centerGrad)" filter="url(#centerShadow)"/>
  <circle cx="400" cy="280" r="62" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.3"/>
  <text x="400" y="272" text-anchor="middle" fill="#fff" font-size="15" font-weight="700" font-family="system-ui, sans-serif">WorkBuddy</text>
  <text x="400" y="292" text-anchor="middle" fill="#bfdbfe" font-size="11" font-family="system-ui, sans-serif">任务引擎</text>

  <!-- Module 1: Skills Market (top-right) -->
  <rect x="500" y="100" width="154" height="78" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="500" y="100" width="154" height="24" rx="10" fill="url(#skillGrad)"/>
  <rect x="500" y="114" width="154" height="10" fill="url(#skillGrad)"/>
  <text x="577" y="118" text-anchor="middle" fill="#fff" font-size="12" font-weight="600" font-family="system-ui, sans-serif">🎯 技能市场</text>
  <text x="577" y="147" text-anchor="middle" fill="#94a3b8" font-size="10.5" font-family="system-ui, sans-serif">一键安装 / 搜索 / 创建</text>
  <text x="577" y="164" text-anchor="middle" fill="#64748b" font-size="10.5" font-family="system-ui, sans-serif">本地运行 · 任意组合</text>

  <!-- Module 2: Claw (top) -->
  <rect x="323" y="62" width="154" height="78" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="323" y="62" width="154" height="24" rx="10" fill="url(#clawGrad)"/>
  <rect x="323" y="76" width="154" height="10" fill="url(#clawGrad)"/>
  <text x="400" y="80" text-anchor="middle" fill="#fff" font-size="12" font-weight="600" font-family="system-ui, sans-serif">🦞 Claw 远程控制</text>
  <text x="400" y="109" text-anchor="middle" fill="#94a3b8" font-size="10.5" font-family="system-ui, sans-serif">手机→IM→桌面</text>
  <text x="400" y="126" text-anchor="middle" fill="#64748b" font-size="10.5" font-family="system-ui, sans-serif">微信/企微/QQ/钉钉/飞书</text>

  <!-- Module 3: Automation (top-left) -->
  <rect x="146" y="100" width="154" height="78" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="146" y="100" width="154" height="24" rx="10" fill="url(#autoGrad)"/>
  <rect x="146" y="114" width="154" height="10" fill="url(#autoGrad)"/>
  <text x="223" y="118" text-anchor="middle" fill="#fff" font-size="12" font-weight="600" font-family="system-ui, sans-serif">⏰ 自动化</text>
  <text x="223" y="147" text-anchor="middle" fill="#94a3b8" font-size="10.5" font-family="system-ui, sans-serif">定时任务 · Cron 调度</text>
  <text x="223" y="164" text-anchor="middle" fill="#64748b" font-size="10.5" font-family="system-ui, sans-serif">模板市场 · 推送小程序</text>

  <!-- Module 4: Knowledge Base (bottom-right) -->
  <rect x="500" y="380" width="154" height="78" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="500" y="380" width="154" height="24" rx="10" fill="url(#kbGrad)"/>
  <rect x="500" y="394" width="154" height="10" fill="url(#kbGrad)"/>
  <text x="577" y="398" text-anchor="middle" fill="#fff" font-size="12" font-weight="600" font-family="system-ui, sans-serif">📚 知识库</text>
  <text x="577" y="427" text-anchor="middle" fill="#94a3b8" font-size="10.5" font-family="system-ui, sans-serif">腾讯文档 / ima / 乐享</text>
  <text x="577" y="444" text-anchor="middle" fill="#64748b" font-size="10.5" font-family="system-ui, sans-serif">企业文件 · 即问即答</text>

  <!-- Module 5: Platform Integration (bottom-left) -->
  <rect x="146" y="380" width="154" height="78" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="146" y="380" width="154" height="24" rx="10" fill="url(#platformGrad)"/>
  <rect x="146" y="394" width="154" height="10" fill="url(#platformGrad)"/>
  <text x="223" y="398" text-anchor="middle" fill="#fff" font-size="12" font-weight="600" font-family="system-ui, sans-serif">🔌 平台接入</text>
  <text x="223" y="427" text-anchor="middle" fill="#94a3b8" font-size="10.5" font-family="system-ui, sans-serif">IM 平台 · 连接器</text>
  <text x="223" y="444" text-anchor="middle" fill="#64748b" font-size="10.5" font-family="system-ui, sans-serif">多端协同 · 随地办公</text>

  <!-- Connection lines from center to modules (dashed, subtle) -->
  <line x1="440" y1="235" x2="505" y2="170" stroke="#64748b" stroke-width="1" stroke-dasharray="4" opacity="0.4"/>
  <line x1="400" y1="215" x2="400" y2="145" stroke="#64748b" stroke-width="1" stroke-dasharray="4" opacity="0.4"/>
  <line x1="360" y1="235" x2="295" y2="170" stroke="#64748b" stroke-width="1" stroke-dasharray="4" opacity="0.4"/>
  <line x1="360" y1="325" x2="295" y2="410" stroke="#64748b" stroke-width="1" stroke-dasharray="4" opacity="0.4"/>
  <line x1="440" y1="325" x2="505" y2="410" stroke="#64748b" stroke-width="1" stroke-dasharray="4" opacity="0.4"/>

  <!-- Bottom strip for model/pricing -->
  <rect x="0" y="498" width="800" height="22" rx="0" fill="#1e293b" opacity="0.6"/>
  <text x="400" y="513" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui, sans-serif">模型配置 · 记忆管理 · 专家中心 · 数据管理 · 帮助反馈</text>
</svg>