<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f19"/>
      <stop offset="40%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="centerGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="centerRadial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="nodeShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.5"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Central radial glow -->
  <circle cx="600" cy="300" r="280" fill="url(#centerRadial)"/>

  <!-- Orbit ring 1 -->
  <circle cx="600" cy="300" r="180" fill="none" stroke="#334155" stroke-width="1" opacity="0.35"/>

  <!-- Orbit ring 2 -->
  <circle cx="600" cy="300" r="260" fill="none" stroke="#334155" stroke-width="0.8" opacity="0.2"/>

  <!-- Orbiting nodes -->
  <g transform="translate(727,173)">
    <circle cx="0" cy="0" r="20" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5" filter="url(#nodeShadow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#06b6d4" font-size="11" font-weight="600" font-family="system-ui, sans-serif">Skills</text>
  </g>

  <g transform="translate(600,80)">
    <circle cx="0" cy="0" r="22" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#nodeShadow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600" font-family="system-ui, sans-serif">Claw</text>
  </g>

  <g transform="translate(473,173)">
    <circle cx="0" cy="0" r="20" fill="#1e293b" stroke="#10b981" stroke-width="1.5" filter="url(#nodeShadow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#10b981" font-size="11" font-weight="600" font-family="system-ui, sans-serif">Auto</text>
  </g>

  <g transform="translate(473,427)">
    <circle cx="0" cy="0" r="20" fill="#1e293b" stroke="#ec4899" stroke-width="1.5" filter="url(#nodeShadow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#ec4899" font-size="11" font-weight="600" font-family="system-ui, sans-serif">KB</text>
  </g>

  <g transform="translate(600,520)">
    <circle cx="0" cy="0" r="20" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" filter="url(#nodeShadow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#6366f1" font-size="11" font-weight="600" font-family="system-ui, sans-serif">IM</text>
  </g>

  <g transform="translate(727,427)">
    <circle cx="0" cy="0" r="20" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5" filter="url(#nodeShadow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600" font-family="system-ui, sans-serif">Model</text>
  </g>

  <!-- Center WorkBuddy node -->
  <circle cx="600" cy="300" r="56" fill="#1e293b" stroke="url(#centerGlow)" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="600" cy="300" r="56" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.15" filter="url(#softGlow)"/>
  <text x="600" y="296" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700" font-family="system-ui, sans-serif">WorkBuddy</text>
  <text x="600" y="314" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui, sans-serif">任务引擎</text>

  <!-- Title -->
  <text x="600" y="486" text-anchor="middle" fill="#e2e8f0" font-size="28" font-weight="700" font-family="system-ui, sans-serif" letter-spacing="1">WorkBuddy 教程</text>
  <text x="600" y="514" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="system-ui, sans-serif">一句话，你的电脑就能替你干活</text>

  <!-- Subtle particles -->
  <g opacity="0.25">
    <rect x="340" y="260" width="3" height="3" rx="1.5" fill="#3b82f6"/>
    <rect x="850" y="240" width="3" height="3" rx="1.5" fill="#8b5cf6"/>
    <rect x="200" y="380" width="3" height="3" rx="1.5" fill="#06b6d4"/>
    <rect x="950" y="350" width="3" height="3" rx="1.5" fill="#10b981"/>
    <rect x="450" y="140" width="3" height="3" rx="1.5" fill="#f59e0b"/>
    <rect x="750" y="450" width="3" height="3" rx="1.5" fill="#ec4899"/>
    <rect x="300" y="420" width="2" height="2" rx="1" fill="#6366f1"/>
    <rect x="880" y="180" width="2" height="2" rx="1" fill="#a78bfa"/>
    <rect x="550" y="160" width="2" height="2" rx="1" fill="#22d3ee"/>
    <rect x="650" y="440" width="2" height="2" rx="1" fill="#f59e0b"/>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="588" width="1200" height="12" fill="url(#centerGlow)" opacity="0.6"/>
</svg>