<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="specGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="ghGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="tacitGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <rect width="800" height="480" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="700" font-family="system-ui, sans-serif">判断工程的不可能三角</text>
  <text x="400" y="56" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="system-ui, sans-serif">① Spec 完备性 &amp;#8226;&amp;#8226;&amp;#8226; ② Goodhart 抗性 &amp;#8226;&amp;#8226;&amp;#8226; ③ Tacit 保全 &amp;#8212; 三者不可兼得</text>

  <!-- Triangle vertices -->
  <!-- Vertex A: Spec Completeness (top) -->
  <circle cx="400" cy="100" r="28" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="96" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="700" font-family="system-ui, sans-serif">① Spec</text>
  <text x="400" y="111" text-anchor="middle" fill="#60a5fa" font-size="9" font-family="system-ui, sans-serif">完备性</text>

  <!-- Vertex B: Goodhart Resistance (bottom-right) -->
  <circle cx="660" cy="380" r="28" fill="#1e293b" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="660" y="376" text-anchor="middle" fill="#10b981" font-size="12" font-weight="700" font-family="system-ui, sans-serif">② GH</text>
  <text x="660" y="391" text-anchor="middle" fill="#34d399" font-size="9" font-family="system-ui, sans-serif">抗性</text>

  <!-- Vertex C: Tacit Preservation (bottom-left) -->
  <circle cx="140" cy="380" r="28" fill="#1e293b" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="376" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="700" font-family="system-ui, sans-serif">③ Tacit</text>
  <text x="140" y="391" text-anchor="middle" fill="#fbbf24" font-size="9" font-family="system-ui, sans-serif">保全</text>

  <!-- Triangle edges -->
  <line x1="420" y1="122" x2="640" y2="358" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
  <line x1="380" y1="122" x2="160" y2="358" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
  <line x1="160" y1="358" x2="640" y2="358" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>

  <!-- Edge labels -->
  <!-- Spec + GH = sacrifice Tacit -->
  <text x="530" y="212" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600" font-family="system-ui, sans-serif">牺牲 ③</text>
  <text x="530" y="228" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui, sans-serif">写死一切·代码正确但没温度</text>

  <!-- Spec + Tacit = sacrifice GH -->
  <text x="260" y="212" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600" font-family="system-ui, sans-serif">牺牲 ②</text>
  <text x="260" y="228" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui, sans-serif">KPI 眼花·线上事故不降反升</text>

  <!-- GH + Tacit = sacrifice Spec -->
  <text x="400" y="370" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600" font-family="system-ui, sans-serif">牺牲 ①</text>
  <text x="400" y="386" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui, sans-serif">拒绝写规则·被卷成人肉复读机</text>

  <!-- Center: where we try to be -->
  <circle cx="400" cy="290" r="16" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>
  <text x="400" y="294" text-anchor="middle" fill="#a78bfa" font-size="8" font-family="system-ui, sans-serif" opacity="0.6">重心</text>

  <!-- Three Stone Tablets at the bottom -->
  <text x="400" y="442" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700" font-family="system-ui, sans-serif">突破路径：三块石碑</text>

  <g transform="translate(80,456)">
    <rect x="0" y="0" width="120" height="20" rx="6" fill="#3b82f6" opacity="0.2"/>
    <text x="60" y="14" text-anchor="middle" fill="#60a5fa" font-size="9" font-family="system-ui, sans-serif">验收即代码</text>
  </g>
  <g transform="translate(216,456)">
    <rect x="0" y="0" width="120" height="20" rx="6" fill="#10b981" opacity="0.2"/>
    <text x="60" y="14" text-anchor="middle" fill="#34d399" font-size="9" font-family="system-ui, sans-serif">对抗审查网络</text>
  </g>
  <g transform="translate(352,456)">
    <rect x="0" y="0" width="120" height="20" rx="6" fill="#f59e0b" opacity="0.2"/>
    <text x="60" y="14" text-anchor="middle" fill="#fbbf24" font-size="9" font-family="system-ui, sans-serif">品味作为资产</text>
  </g>
  <g transform="translate(488,456)">
    <rect x="0" y="0" width="120" height="20" rx="6" fill="#a78bfa" opacity="0.2"/>
    <text x="60" y="14" text-anchor="middle" fill="#c4b5fd" font-size="9" font-family="system-ui, sans-serif">贴着重心前进</text>
  </g>
</svg>