<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f19"/>
      <stop offset="40%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="mirrorGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glowRadial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bgGrad)"/>

  <!-- Grid -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Central glow -->
  <ellipse cx="600" cy="260" rx="300" ry="200" fill="url(#glowRadial)"/>

  <!-- Mirror surface -->
  <ellipse cx="600" cy="280" rx="180" ry="36" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="600" cy="280" rx="160" ry="28" fill="none" stroke="#818cf8" stroke-width="0.8" opacity="0.3"/>

  <!-- Left side: Human silhouette (geometric) -->
  <g opacity="0.7">
    <!-- Head -->
    <circle cx="420" cy="180" r="28" fill="none" stroke="#e2e8f0" stroke-width="2"/>
    <!-- Body -->
    <line x1="420" y1="208" x2="420" y2="296" stroke="#e2e8f0" stroke-width="2"/>
    <!-- Arms -->
    <line x1="420" y1="232" x2="380" y2="268" stroke="#e2e8f0" stroke-width="1.5"/>
    <line x1="420" y1="232" x2="460" y2="256" stroke="#e2e8f0" stroke-width="1.5"/>
    <!-- Legs -->
    <line x1="420" y1="296" x2="396" y2="340" stroke="#e2e8f0" stroke-width="1.5"/>
    <line x1="420" y1="296" x2="444" y2="340" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>

  <!-- Left side: Text fragments (tacit knowledge) -->
  <text x="340" y="380" fill="#94a3b8" font-size="10" font-family="system-ui, sans-serif" opacity="0.5">"说不清"</text>
  <text x="460" y="400" fill="#94a3b8" font-size="10" font-family="system-ui, sans-serif" opacity="0.5">"直觉"</text>
  <text x="380" y="420" fill="#94a3b8" font-size="10" font-family="system-ui, sans-serif" opacity="0.5">"默契"</text>

  <!-- Arrow from human to mirror -->
  <path d="M 460,280 C 500,280 520,270 540,275" stroke="#6366f1" stroke-width="1.5" fill="none" opacity="0.6" marker-end="url(#arrowR)"/>
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Right side: AI/Machine (geometric shapes) -->
  <g opacity="0.7">
    <rect x="720" y="220" width="80" height="56" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
    <!-- Circuit lines inside -->
    <line x1="732" y1="236" x2="772" y2="236" stroke="#06b6d4" stroke-width="1" opacity="0.6"/>
    <line x1="748" y1="236" x2="748" y2="260" stroke="#06b6d4" stroke-width="1" opacity="0.6"/>
    <line x1="748" y1="260" x2="788" y2="260" stroke="#06b6d4" stroke-width="1" opacity="0.6"/>
    <!-- Dots -->
    <circle cx="748" cy="236" r="3" fill="#22d3ee"/>
    <circle cx="748" cy="260" r="3" fill="#22d3ee"/>
  </g>

  <!-- Right side: Output text fragments (explicit knowledge) -->
  <text x="680" y="380" fill="#22d3ee" font-size="10" font-family="system-ui, sans-serif" opacity="0.6">project.md</text>
  <text x="800" y="400" fill="#22d3ee" font-size="10" font-family="system-ui, sans-serif" opacity="0.6">Spec</text>
  <text x="720" y="420" fill="#22d3ee" font-size="10" font-family="system-ui, sans-serif" opacity="0.6">Rule</text>

  <!-- Reflection arrow from mirror back to human -->
  <path d="M 640,290 C 580,310 500,310 460,295" stroke="#a78bfa" stroke-width="1.5" fill="none" opacity="0.4" marker-end="url(#arrowL)"/>
  <defs>
    <marker id="arrowL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Central mirror concept -->
  <text x="600" y="220" text-anchor="middle" fill="#a78bfa" font-size="13" font-family="system-ui, sans-serif" opacity="0.7">镜子</text>

  <!-- Title -->
  <text x="600" y="486" text-anchor="middle" fill="#e2e8f0" font-size="26" font-weight="700" font-family="system-ui, sans-serif">AI 时代的"显形"运动</text>
  <text x="600" y="514" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="system-ui, sans-serif">你以为在给 AI 套缰绳，其实它逼你看见了从未看见过的自己</text>

  <!-- Bottom accent -->
  <rect x="0" y="588" width="1200" height="12" fill="url(#mirrorGrad)" opacity="0.5"/>
</svg>