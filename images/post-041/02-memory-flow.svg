<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="arrowD" markerWidth="6" markerHeight="8" refX="3" refY="8" orient="auto">
      <polygon points="0 0, 6 0, 3 8" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="800" height="360" rx="12" fill="url(#bg)"/>

  <text x="400" y="32" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700" font-family="system-ui, sans-serif">Dreaming 记忆晋升：三阶段加权门控</text>

  <!-- 4 input sources -->
  <g filter="url(#shadow)">
    <rect x="30" y="60" width="140" height="36" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  </g>
  <text x="100" y="82" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, sans-serif">/new · Compaction · LLM · Dreaming</text>

  <text x="100" y="112" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui, sans-serif">4 路径流入</text>

  <!-- Daily memory (pull layer) -->
  <g filter="url(#shadow)">
    <rect x="220" y="56" width="160" height="52" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="1.2"/>
  </g>
  <text x="300" y="78" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600" font-family="system-ui, sans-serif">memory/YYYY-MM-DD</text>
  <text x="300" y="96" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui, sans-serif">召回层（pull）</text>

  <!-- Arrow from sources to daily -->
  <line x1="170" y1="78" x2="220" y2="78" stroke="#64748b" stroke-width="1" marker-end="url(#arrowR)" opacity="0.5"/>

  <!-- Dreaming three phases -->
  <g filter="url(#shadow)">
    <rect x="420" y="48" width="360" height="72" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <text x="600" y="68" text-anchor="middle" fill="#10b981" font-size="12" font-weight="700" font-family="system-ui, sans-serif">Dreaming 三阶段</text>

  <!-- Light -->
  <rect x="432" y="80" width="100" height="28" rx="6" fill="#064e3b" opacity="0.5"/>
  <text x="482" y="98" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600" font-family="system-ui, sans-serif">Light Sleep</text>

  <!-- REM -->
  <rect x="544" y="80" width="100" height="28" rx="6" fill="#064e3b" opacity="0.5"/>
  <text x="594" y="98" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600" font-family="system-ui, sans-serif">REM Sleep</text>

  <!-- Deep -->
  <rect x="656" y="80" width="112" height="28" rx="6" fill="#064e3b" opacity="0.7"/>
  <text x="712" y="98" text-anchor="middle" fill="#10b981" font-size="10" font-weight="700" font-family="system-ui, sans-serif">Deep Sleep ✍</text>

  <!-- Arrow from daily to Dreaming -->
  <line x1="380" y1="78" x2="420" y2="78" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowR)" opacity="0.6"/>

  <!-- MEMORY.md (push layer) -->
  <g filter="url(#shadow)">
    <rect x="220" y="160" width="160" height="52" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <text x="300" y="182" text-anchor="middle" fill="#10b981" font-size="12" font-weight="600" font-family="system-ui, sans-serif">MEMORY.md</text>
  <text x="300" y="200" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui, sans-serif">静态层（push · 每轮注入）</text>

  <!-- Arrow from Dreaming to MEMORY.md -->
  <line x1="600" y1="120" x2="380" y2="172" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowD)" opacity="0.6"/>
  <text x="520" y="148" text-anchor="middle" fill="#10b981" font-size="9" font-family="system-ui, sans-serif" opacity="0.7">Deep 写入</text>

  <!-- Deep scoring formula -->
  <g filter="url(#shadow)">
    <rect x="40" y="240" width="720" height="96" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  </g>
  <text x="400" y="264" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600" font-family="system-ui, sans-serif">Deep 晋升评分 = 6 信号加权</text>
  <text x="400" y="286" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="monospace">0.30×relevance + 0.24×frequency + 0.15×diversity + 0.15×recency + 0.10×consolidation + 0.06×conceptual</text>
  <text x="400" y="306" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui, sans-serif">三重门禁：score ≥ 0.75 AND recallCount ≥ 3 AND uniqueQueries ≥ 2</text>
  <text x="400" y="324" text-anchor="middle" fill="#10b981" font-size="10" font-family="system-ui, sans-serif">全部通过 → 晋升写入 MEMORY.md（永久固化）</text>
</svg>