<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f19"/>
      <stop offset="40%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <radialGradient id="glowRadial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bgGrad)"/>

  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <ellipse cx="600" cy="260" rx="280" ry="180" fill="url(#glowRadial)"/>

  <!-- Central Gateway node -->
  <g filter="url(#shadow)">
    <rect x="520" y="220" width="160" height="80" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
  </g>
  <text x="600" y="254" text-anchor="middle" fill="#06b6d4" font-size="16" font-weight="700" font-family="system-ui, sans-serif">Gateway</text>
  <text x="600" y="276" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, sans-serif">微内核中枢 :18789</text>

  <!-- Surrounding nodes -->
  <!-- Channel plugins (top-left) -->
  <g filter="url(#shadow)">
    <rect x="200" y="120" width="120" height="52" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.2"/>
  </g>
  <text x="260" y="146" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600" font-family="system-ui, sans-serif">Channel 25+</text>
  <text x="260" y="162" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui, sans-serif">QQ/Discord/飞书</text>

  <!-- Agent (top-right) -->
  <g filter="url(#shadow)">
    <rect x="880" y="120" width="120" height="52" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  </g>
  <text x="940" y="146" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600" font-family="system-ui, sans-serif">Multi-Agent</text>
  <text x="940" y="162" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui, sans-serif">物理隔离路由</text>

  <!-- Memory (bottom-left) -->
  <g filter="url(#shadow)">
    <rect x="200" y="340" width="120" height="52" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.2"/>
  </g>
  <text x="260" y="366" text-anchor="middle" fill="#10b981" font-size="11" font-weight="600" font-family="system-ui, sans-serif">Dreaming</text>
  <text x="260" y="382" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui, sans-serif">三阶段记忆晋升</text>

  <!-- Plugin SDK (bottom-right) -->
  <g filter="url(#shadow)">
    <rect x="880" y="340" width="120" height="52" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="1.2"/>
  </g>
  <text x="940" y="366" text-anchor="middle" fill="#ec4899" font-size="11" font-weight="600" font-family="system-ui, sans-serif">Plugin SDK</text>
  <text x="940" y="382" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui, sans-serif">万物皆插件</text>

  <!-- Connection lines -->
  <line x1="320" y1="146" x2="520" y2="248" stroke="#334155" stroke-width="1" stroke-dasharray="4" opacity="0.4"/>
  <line x1="880" y1="146" x2="680" y2="248" stroke="#334155" stroke-width="1" stroke-dasharray="4" opacity="0.4"/>
  <line x1="320" y1="366" x2="520" y2="280" stroke="#334155" stroke-width="1" stroke-dasharray="4" opacity="0.4"/>
  <line x1="880" y1="366" x2="680" y2="280" stroke="#334155" stroke-width="1" stroke-dasharray="4" opacity="0.4"/>

  <!-- Title -->
  <text x="600" y="486" text-anchor="middle" fill="#e2e8f0" font-size="26" font-weight="700" font-family="system-ui, sans-serif">OpenClaw 架构拆解</text>
  <text x="600" y="514" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="system-ui, sans-serif">TypeScript 微内核、Gateway 路由、记忆引擎与工程取舍</text>

  <rect x="0" y="588" width="1200" height="12" fill="url(#accentGrad)" opacity="0.5"/>
</svg>