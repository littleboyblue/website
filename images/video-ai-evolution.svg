<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <rect width="800" height="320" rx="12" fill="#0f0f1a"/>
  <text x="400" y="42" text-anchor="middle" fill="#a78bfa" font-size="16" font-family="sans-serif" font-weight="600">视频 AI 的三层进化</text>

  <!-- Stage 1 -->
  <rect x="40" y="70" width="220" height="90" rx="8" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1"/>
  <text x="150" y="102" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="600">阶段一：能不能生成？</text>
  <text x="150" y="124" text-anchor="middle" fill="#94a3b8" font-size="12">文字 → 视频</text>
  <text x="150" y="144" text-anchor="middle" fill="#64748b" font-size="11">画面质量 · 动作自然 · 镜头稳定</text>

  <!-- Arrow 1 -->
  <text x="278" y="116" text-anchor="middle" fill="#a78bfa" font-size="20">→</text>

  <!-- Stage 2 -->
  <rect x="292" y="70" width="220" height="90" rx="8" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1"/>
  <text x="402" y="102" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="600">阶段二：能不能控制？</text>
  <text x="402" y="124" text-anchor="middle" fill="#94a3b8" font-size="12">角色一致 · 脚本驱动 · 批量产出</text>
  <text x="402" y="144" text-anchor="middle" fill="#64748b" font-size="11">广告 · 短剧 · 影视 · 社媒</text>

  <!-- Arrow 2 -->
  <text x="530" y="116" text-anchor="middle" fill="#a78bfa" font-size="20">→</text>

  <!-- Stage 3 -->
  <rect x="544" y="70" width="220" height="90" rx="8" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
  <text x="654" y="102" text-anchor="middle" fill="#ddd6fe" font-size="14" font-weight="600">阶段三：能不能理解世界？</text>
  <text x="654" y="124" text-anchor="middle" fill="#94a3b8" font-size="12">物理规律 · 因果预测 · 空间推理</text>
  <text x="654" y="144" text-anchor="middle" fill="#818cf8" font-size="11">世界模型 · 具身智能</text>

  <!-- X axis label -->
  <text x="400" y="195" text-anchor="middle" fill="#475569" font-size="12">能力深度 ↑</text>

  <!-- Description -->
  <text x="400" y="230" text-anchor="middle" fill="#64748b" font-size="13">从一个内容生成工具，逐渐演变为理解物理世界的底层能力</text>
</svg>