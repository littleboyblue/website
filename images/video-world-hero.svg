<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="260" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="46" text-anchor="middle" fill="#e2e8f0" font-size="22" font-family="sans-serif" font-weight="700">从生成短片到构建世界</text>
  <text x="400" y="72" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="sans-serif">视频模型公司如何从内容工具，走向世界模型、具身智能与商业闭环</text>

  <!-- Flow: 5 boxes connected by arrows -->
  <!-- Box 1: 视频生成 -->
  <rect x="26" y="115" width="130" height="60" rx="8" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="91" y="140" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="600">视频生成</text>
  <text x="91" y="160" text-anchor="middle" fill="#64748b" font-size="11">内容工具</text>

  <!-- Arrow 1→2 -->
  <line x1="156" y1="145" x2="196" y2="145" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 2: 世界模型 -->
  <rect x="202" y="115" width="130" height="60" rx="8" fill="#1e1b4b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="267" y="140" text-anchor="middle" fill="#fcd34d" font-size="14" font-weight="600">世界模型</text>
  <text x="267" y="160" text-anchor="middle" fill="#64748b" font-size="11">理解物理</text>

  <!-- Arrow 2→3 -->
  <line x1="332" y1="145" x2="372" y2="145" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 3: 具身智能 -->
  <rect x="378" y="115" width="130" height="60" rx="8" fill="#1e1b4b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="443" y="140" text-anchor="middle" fill="#67e8f9" font-size="14" font-weight="600">具身智能</text>
  <text x="443" y="160" text-anchor="middle" fill="#64748b" font-size="11">机器人</text>

  <!-- Arrow 3→4 -->
  <line x1="508" y1="145" x2="548" y2="145" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 4: Agent -->
  <rect x="554" y="115" width="100" height="60" rx="8" fill="#1e1b4b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="604" y="140" text-anchor="middle" fill="#a5f3fc" font-size="14" font-weight="600">Agent</text>
  <text x="604" y="160" text-anchor="middle" fill="#64748b" font-size="11">Co-creator</text>

  <!-- Arrow 4→5 -->
  <line x1="654" y1="145" x2="694" y2="145" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 5: RaaS -->
  <rect x="700" y="115" width="74" height="60" rx="8" fill="#2e0a36" stroke="#ec4899" stroke-width="1.5"/>
  <text x="737" y="140" text-anchor="middle" fill="#f9a8d4" font-size="14" font-weight="600">RaaS</text>
  <text x="737" y="160" text-anchor="middle" fill="#64748b" font-size="11">按结果</text>

  <!-- Bottom note -->
  <text x="400" y="222" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">模型能力沿着产业链延伸，每一层都在扩大价值边界</text>
</svg>