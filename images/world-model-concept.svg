<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" fill="none">
  <defs>
    <marker id="arrD" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M0,0 L8,0 L4,6 Z" fill="#6366f1"/>
    </marker>
    <marker id="arrR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6366f1"/>
    </marker>
    <marker id="arrL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="800" height="360" rx="12" fill="#0f0f1a"/>
  <text x="400" y="38" text-anchor="middle" fill="#f59e0b" font-size="16" font-family="sans-serif" font-weight="600">世界模型的核心循环</text>

  <!-- 中央：世界模型 -->
  <rect x="300" y="110" width="200" height="60" rx="12" fill="#1c1917" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="138" text-anchor="middle" fill="#fcd34d" font-size="15" font-weight="600">世界模型</text>
  <text x="400" y="158" text-anchor="middle" fill="#94a3b8" font-size="11">World Model</text>

  <!-- 上方：观察状态 -->
  <rect x="300" y="55" width="200" height="42" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="400" y="81" text-anchor="middle" fill="#a5b4fc" font-size="13">👁 观察状态 Observe</text>
  <!-- 箭头：Observe → World Model -->
  <line x1="400" y1="97" x2="400" y2="106" stroke="#6366f1" stroke-width="2" marker-end="url(#arrD)"/>

  <!-- 下方：预测结果 -->
  <rect x="300" y="200" width="200" height="42" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="400" y="226" text-anchor="middle" fill="#a5b4fc" font-size="13">🔮 预测结果 Predict</text>
  <!-- 箭头：World Model → Predict -->
  <line x1="400" y1="170" x2="400" y2="196" stroke="#6366f1" stroke-width="2" marker-end="url(#arrD)"/>

  <!-- 左侧：心智模拟 -->
  <rect x="38" y="110" width="200" height="60" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="138" y="138" text-anchor="middle" fill="#c7d2fe" font-size="13">🧠 心智模拟</text>
  <text x="138" y="158" text-anchor="middle" fill="#818cf8" font-size="11">Mental Simulation</text>
  <!-- 箭头：Simulate → World Model -->
  <line x1="238" y1="140" x2="296" y2="140" stroke="#6366f1" stroke-width="2" marker-end="url(#arrR)"/>

  <!-- 右侧：执行动作 -->
  <rect x="562" y="110" width="200" height="60" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="662" y="138" text-anchor="middle" fill="#c7d2fe" font-size="13">🎯 执行动作 Act</text>
  <text x="662" y="158" text-anchor="middle" fill="#818cf8" font-size="11">Execute &amp; Verify</text>
  <!-- 箭头：World Model → Act -->
  <line x1="500" y1="140" x2="558" y2="140" stroke="#6366f1" stroke-width="2" marker-end="url(#arrR)"/>

  <!-- Bottom description -->
  <text x="400" y="300" text-anchor="middle" fill="#64748b" font-size="13">视频模型天然在隐式学习时空连续性、物理约束与因果变化</text>
</svg>