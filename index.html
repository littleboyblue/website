<!DOCTYPE HTML>
<html>
<head>
    <title>思考空间 - 探索 AI 与技术</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/harmonyos-sans/HarmonyOS-Sans.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

         body {
             background: #f5f5f5;
             font-family: 'HarmonyOS Sans', sans-serif;
             font-weight: 300;
             color: #666;
             line-height: 1.8;
         }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        #bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(20, 30, 50, 0.45);
            z-index: -1;
        }

         #wrapper {
             width: 100%;
             max-width: 1400px;
             margin: 0 auto;
             padding: 60px 30px;
             padding-bottom: 80px;
             min-height: 100vh;
         }

        #header {
            position: fixed;
            left: calc(50% - 700px + 15px);
            width: 260px;
            top: 60px;
            height: calc(100vh - 120px);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

         #main {
             margin-left: 300px;
             background: #fff;
             border-radius: 6px;
             padding: 40px 40px;
             box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
             min-height: calc(100vh - 120px);
             max-height: calc(100vh - 120px);
             overflow-y: auto;
         }

        .avatar {
            margin-bottom: 20px;
        }

        .avatar img {
            border-radius: 100%;
            width: 100px;
            height: 100px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            display: block;
        }

        #header h1 {
            font-size: 1.5em;
            color: #fff;
            margin-bottom: 1em;
            font-weight: 400;
        }

        #header h1 strong {
            color: #fff;
            display: block;
        }

        #header p {
            color: rgba(255, 255, 255, 0.75);
            font-size: 1em;
        }

        #header a {
            color: #fff;
            border-bottom-color: rgba(255, 255, 255, 0.3);
        }

        #header a:hover {
            color: #49bf9d;
            border-bottom-color: transparent;
        }

        section {
            margin-bottom: 40px;
        }

        section:last-child {
            margin-bottom: 0;
        }

        .major h2 {
            font-size: 1.8em;
            color: #49bf9d;
            margin-bottom: 1em;
            padding-bottom: 0.5em;
            border-bottom: 3px solid #49bf9d;
            display: inline-block;
            font-weight: 400;
        }

        p {
            margin-bottom: 1.5em;
        }

        a {
            color: #49bf9d;
            text-decoration: none;
            border-bottom: dotted 1px rgba(73, 191, 157, 0.5);
        }

        a:hover {
            border-bottom: none;
        }

        .blog-list {
            list-style: none;
        }

        .blog-item {
            padding: 25px 0;
            border-bottom: 1px solid #eee;
        }

        .blog-item:first-child {
            padding-top: 0;
        }

        .blog-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .blog-item a {
            display: block;
            border-bottom: none;
        }

        .blog-item h3 {
            font-size: 1.5em;
            color: #444;
            margin-bottom: 8px;
            font-weight: 400;
            transition: color 0.2s;
        }

        .blog-item:hover h3 {
            color: #49bf9d;
        }

        .blog-meta {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 12px;
        }

        .blog-excerpt {
            font-size: 1.1em;
            color: #777;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 25px;
            position: fixed;
            top: 60px;
            left: 330px;
            z-index: 10;
            color: #49bf9d;
            font-size: 0.95em;
        }

        article h1 {
            font-size: 2.5em;
            color: #444;
            margin-bottom: 10px;
            font-weight: 400;
        }

        .post-meta {
            color: #aaa;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        /* Markdown styles */
          .markdown-content {
              font-size: 1.1em;
          }

          .markdown-content h1 {
              font-size: 2.1em;
              margin: 1.5em 0 0.8em;
              color: #333;
              font-weight: 400;
          }

          .markdown-content h2 {
              font-size: 1.8em;
              margin: 1.4em 0 0.7em;
              color: #333;
              font-weight: 400;
          }

          .markdown-content h3 {
              font-size: 1.4em;
              margin: 1.3em 0 0.6em;
              color: #333;
              font-weight: 400;
          }

        .markdown-content p {
            margin-bottom: 1.2em;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin-bottom: 1.2em;
            padding-left: 2em;
        }

        .markdown-content li {
            margin-bottom: 0.5em;
        }

        .markdown-content code {
            background: #f5f5f5;
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .markdown-content pre {
            background: #1e1e1e;
            border-radius: 6px;
            padding: 1.2em;
            overflow-x: auto;
            margin: 1.5em 0;
        }

        .markdown-content pre code {
            background: none;
            color: #d4d4d4;
            padding: 0;
        }

        .markdown-content blockquote {
            border-left: 4px solid #49bf9d;
            padding-left: 1em;
            color: #888;
            margin: 1.5em 0;
            font-style: italic;
        }

        .markdown-content img {
            max-width: 100%;
            border-radius: 6px;
            margin: 1.5em 0;
        }

        .markdown-content table {
            border-collapse: collapse;
            margin: 1.5em 0;
            width: 100%;
        }

        .markdown-content th,
        .markdown-content td {
            border: 1px solid #ddd;
            padding: 0.8em 1em;
            text-align: left;
        }

        .markdown-content th {
            background: #f9f9f9;
            font-weight: 400;
        }

          #footer {
              position: fixed;
              bottom: 20px;
              left: 30px;
              color: rgba(255, 255, 255, 0.6);
              font-size: 0.9em;
              padding-top: 0;
              margin-top: 0;
              border-top: none;
              text-align: left;
          }

        #footer a {
            color: #fff;
            border-bottom-color: rgba(255, 255, 255, 0.3);
        }

        #footer a:hover {
            color: #49bf9d;
            border-bottom: none;
        }

        @media screen and (max-width: 960px) {
            #wrapper {
                padding: 20px 15px;
            }

            #header {
                position: relative;
                left: auto;
                width: auto;
                height: auto;
                text-align: center;
                background: rgba(0, 0, 0, 0.2);
                padding: 40px 20px;
                border-radius: 6px;
                margin-bottom: 20px;
                top: 0;
            }

            .avatar {
                margin: 0 auto 20px;
                display: inline-block;
            }

             #main {
                 margin-left: 0;
                 padding: 30px 25px;
                 max-height: calc(100vh - 320px);
                 overflow-y: auto;
             }

             .markdown-content {
                 font-size: 1.1em;
             }

             article h1 {
                 font-size: 2em;
             }

             #footer {
                 position: static;
                 bottom: auto;
                 left: auto;
                 transform: none;
                 width: auto;
                 max-width: none;
                 margin-left: 0;
                 padding-top: 25px;
                 margin-top: 25px;
                 border-top: 1px solid rgba(255, 255, 255, 0.2);
             }
         }

         @media screen and (max-width: 480px) {
             #wrapper {
                 padding: 10px;
             }

             #header {
                 padding: 30px 15px;
             }

             #main {
                 padding: 20px 15px;
                 max-height: calc(100vh - 240px);
                 overflow-y: auto;
             }
         }
    </style>
</head>
<body>
    <video id="bg-video" autoplay muted loop playsinline>
        <source src="/videos/background.mp4" type="video/mp4">
    </video>
    <div id="bg-overlay"></div>
    <div id="wrapper">
        <header id="header">
            <div class="avatar">
                <img src="images/avatar.png" alt="Avatar" />
            </div>
            <h1><strong>思考空间</strong></h1>
            <p>探索 AI 与技术的深度思考<br>
            记录学习与成长</p>
        </header>

        <div id="main">
            <div id="app">
                <!-- Content will be rendered here -->
            </div>
        </div>

        <footer id="footer">
            <p>&copy; <span id="year"></span> 思考空间 • <a href="https://washi.lol">washi.lol</a></p>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script>
        // Configure marked
        marked.setOptions({
            highlight: (code, lang) => {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        // Blog configuration
        const blogConfig = {
            title: '思考空间',
            description: '探索 AI 与技术的深度思考，记录学习与成长',
            posts: [
                {
                    id: 'agent-mcp-skill-intro',
                    title: 'Agent、MCP 和 Skill：AI 智能体的模块化科普',
                    date: '2026年4月10日',
                    excerpt: '用通俗易懂的方式解释 AI 智能体领域的三个核心概念：Agent、MCP 和 Skill，以及它们之间的关系，为什么模块化是未来方向。',
                    file: 'posts/agent-mcp-skill-intro.md'
                }
            ]
        };

        // App state
        let currentPost = null;

        // Elements
        const app = document.getElementById('app');

        // Render home page (blog list)
         function renderHome() {
             let html = `
                 <section>
                     <header class="major">
                         <h2>近期文章</h2>
                     </header>
                     <ul class="blog-list">
             `;

             [...blogConfig.posts].sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(post => {
                 html += `
                     <li class="blog-item">
                         <a href="#" onclick="loadPost('${post.id}'); return false;">
                             <h3>${post.title}</h3>
                             <div class="blog-meta">${post.date}</div>
                             <p class="blog-excerpt">${post.excerpt}</p>
                         </a>
                     </li>
                 `;
             });

             html += `
                     </ul>
                 </section>
             `;

             app.innerHTML = html;
             document.getElementById('year').textContent = new Date().getFullYear();
             // Clear hash when returning home
             location.hash = '';
         }

        // Load and render a post
        async function loadPost(postId) {
            const post = blogConfig.posts.find(p => p.id === postId);
            if (!post) return;

            currentPost = post;

            try {
                const response = await fetch(post.file);
                if (!response.ok) {
                    throw new Error('Post not found');
                }
                const markdown = await response.text();
                const content = marked.parse(markdown);

                const html = `
                    <article>
                        <a href="#" onclick="renderHome(); return false;" class="back-link">← 返回文章列表</a>
                        <h1>${post.title}</h1>
                        <div class="post-meta">${post.date}</div>
                        <div class="markdown-content">${content}</div>
                    </article>
                `;

                app.innerHTML = html;
                document.getElementById('year').textContent = new Date().getFullYear();

                // Highlight code blocks
                document.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });

                 // Update URL hash
                 location.hash = '#p/' + postId;
            } catch (error) {
                console.error('Error loading post:', error);
                app.innerHTML = `
                    <a href="#" onclick="renderHome(); return false;" class="back-link">← 返回博客</a>
                    <h1>Error</h1>
                    <p>Failed to load post. Please check if the Markdown file exists.</p>
                `;
            }
        }

         // Handle routing
         function handleRoute() {
             const hash = location.hash;
             if (hash.startsWith('#p/')) {
                 const postId = hash.slice(3);
                 if (postId) {
                     loadPost(postId);
                     return;
                 }
             }
             renderHome();
         }

        // Initial render
        handleRoute();

        // Listen to hash changes
        window.addEventListener('hashchange', handleRoute);

        // Set year
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
