<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具集合 - 个人工具箱</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1.125rem;
            font-weight: 300;
            opacity: 0.95;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .tool-card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .tool-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        }

        .tool-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            font-size: 40px;
        }

        .speedtest-icon {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .devtools-icon {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .tool-card h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        .tool-card p {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.6;
        }

        .arrow {
            margin-top: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .tool-card:hover .arrow {
            background: #667eea;
            transform: translateX(5px);
        }

        .tool-card:hover .arrow svg {
            stroke: white;
        }

        .arrow svg {
            width: 20px;
            height: 20px;
            stroke: #666;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.875rem;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .tools-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .tool-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>我的工具箱</h1>
            <p class="subtitle">实用在线工具，随用随取</p>
        </header>

        <div class="tools-grid">
            <a href="/speedtest/" class="tool-card">
                <div class="tool-icon speedtest-icon">
                    📊
                </div>
                <h2>网速测试</h2>
                <p>测试你的下载速度、上传速度和网络延迟，结果保存本地历史记录</p>
                <div class="arrow">
                    <svg viewBox="0 0 24 24">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </div>
            </a>

            <a href="/dev-tools/" class="tool-card">
                <div class="tool-icon devtools-icon">
                    🛠️
                </div>
                <h2>开发小工具</h2>
                <p>时间戳转换、色值转换、JSON格式化、Base64编码、UUID生成</p>
                <div class="arrow">
                    <svg viewBox="0 0 24 24">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </div>
            </a>
        </div>

        <footer>
            <p>🕒 由 washi.lol 提供 © <span id="year"></span></p>
        </footer>
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
