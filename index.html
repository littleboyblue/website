<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>思考空间 - 技术博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #fbfbfc;
            --card-bg: #ffffff;
            --text-color: #1a1a2e;
            --secondary-text: #64748b;
            --border-color: #e2e8f0;
            --hover-bg: #f8fafc;
            --accent-color: #0f172a;
            --code-bg: #f1f5f9;
        }

        body {
            font-family: 'Inter', 'Noto Serif SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: var(--text-color);
            line-height: 1.7;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(14, 165, 233, 0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
            position: relative;
            z-index: 1;
        }

        .site-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .site-title {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 12px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 16px;
            letter-spacing: -0.5px;
        }

        .site-title .icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #6366f1, #0ea5e9);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .site-description {
            font-size: 1.2rem;
            color: var(--secondary-text);
            font-weight: 300;
            line-height: 1.6;
        }

        main {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        nav {
            margin-top: 20px;
        }

        nav a {
            color: var(--secondary-text);
            text-decoration: none;
            margin-right: 24px;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--accent-color);
        }

        .blog-list {
            list-style: none;
        }

        .blog-item {
            padding: 24px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .blog-item:last-child {
            border-bottom: none;
        }

        .blog-item a {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .blog-item:hover {
            background-color: var(--hover-bg);
            margin: 0 -20px;
            padding-left: 20px;
            padding-right: 20px;
            border-radius: 8px;
        }

        .blog-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 8px;
            transition: color 0.2s;
        }

        .blog-item:hover .blog-title {
            color: var(--accent-color);
        }

        .blog-meta {
            font-size: 0.875rem;
            color: var(--secondary-text);
            margin-bottom: 12px;
        }

        .blog-excerpt {
            color: var(--secondary-text);
            font-size: 1rem;
            line-height: 1.6;
        }

        /* Markdown content styles */
        .markdown-content {
            font-family: 'Noto Serif SC', serif;
        }

        .markdown-content h1 {
            font-size: 2.2rem;
            margin: 40px 0 20px;
            font-weight: 600;
        }

        .markdown-content h2 {
            font-size: 1.8rem;
            margin: 35px 0 18px;
            font-weight: 600;
        }

        .markdown-content h3 {
            font-size: 1.4rem;
            margin: 30px 0 15px;
            font-weight: 600;
        }

        .markdown-content p {
            margin-bottom: 18px;
            font-size: 1.1rem;
            line-height: 1.8;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin-bottom: 18px;
            padding-left: 30px;
        }

        .markdown-content li {
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .markdown-content code {
            background-color: var(--code-bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', Menlo, Monaco, Consolas, monospace;
            font-size: 0.9em;
        }

        .markdown-content pre {
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
            margin: 20px 0;
        }

        .markdown-content pre code {
            background: none;
            color: #d4d4d4;
            padding: 0;
        }

        .markdown-content blockquote {
            border-left: 4px solid var(--accent-color);
            padding-left: 16px;
            color: var(--secondary-text);
            margin: 20px 0;
            font-style: italic;
        }

        .markdown-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 20px 0;
        }

        .markdown-content a {
            color: var(--accent-color);
            text-decoration: none;
            border-bottom: 1px solid transparent;
        }

        .markdown-content a:hover {
            border-bottom-color: var(--accent-color);
        }

        .markdown-content table {
            border-collapse: collapse;
            margin: 20px 0;
            width: 100%;
        }

        .markdown-content th,
        .markdown-content td {
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            text-align: left;
        }

        .markdown-content th {
            background-color: var(--hover-bg);
            font-weight: 600;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: var(--secondary-text);
            text-decoration: none;
            font-size: 0.95rem;
        }

        .back-link:hover {
            color: var(--accent-color);
        }

        article header h1 {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        article .post-meta {
            color: var(--secondary-text);
            font-size: 0.95rem;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        footer {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
            text-align: center;
            color: var(--secondary-text);
            font-size: 0.875rem;
        }

         @media (max-width: 768px) {
             .container {
                 padding: 30px 16px;
             }

             .site-header, main {
                 padding: 24px 20px;
             }

             .site-title {
                 font-size: 2rem;
                 gap: 10px;
             }

             .site-title .icon {
                 width: 40px;
                 height: 40px;
                 font-size: 22px;
             }

             .site-header h1 {
                 font-size: 2rem;
             }

             .markdown-content h1 {
                 font-size: 1.8rem;
             }


            .markdown-content h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Index page will be rendered here -->
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script>
        // Configure marked
        marked.setOptions({
            highlight: (code, lang) => {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        // Blog configuration
        const blogConfig = {
            title: '思考空间',
            description: '探索 AI 与技术的深度思考，记录学习与成长',
            posts: [
                {
                    id: 'agent-mcp-skill-intro',
                    title: 'Agent、MCP 和 Skill：AI 智能体的模块化科普',
                    date: '2026年4月10日',
                    excerpt: '用通俗易懂的方式解释 AI 智能体领域的三个核心概念：Agent、MCP 和 Skill，以及它们之间的关系，为什么模块化是未来方向。',
                    file: 'posts/agent-mcp-skill-intro.md'
                }
            ]
        };

        // App state
        let currentPost = null;

        // Elements
        const app = document.getElementById('app');

        // Render home page (blog list)
        function renderHome() {
            let html = `
                <div class="site-header">
                    <h1 class="site-title">
                        <span class="icon">💭</span>
                        ${blogConfig.title}
                    </h1>
                    <p class="site-description">${blogConfig.description}</p>
                </div>
                <main>
                    <ul class="blog-list">
            `;

            blogConfig.posts.forEach(post => {
                html += `
                    <li class="blog-item">
                        <a href="#" onclick="loadPost('${post.id}'); return false;">
                            <h2 class="blog-title">${post.title}</h2>
                            <div class="blog-meta">${post.date}</div>
                            <p class="blog-excerpt">${post.excerpt}</p>
                        </a>
                    </li>
                `;
            });

            html += `
                    </ul>
                </main>
                <footer>
                    <p>© <span id="year"></span> 思考空间 • 静水流深</p>
                </footer>
            `;

            app.innerHTML = html;
            document.getElementById('year').textContent = new Date().getFullYear();
        }

        // Load and render a post
        async function loadPost(postId) {
            const post = blogConfig.posts.find(p => p.id === postId);
            if (!post) return;

            currentPost = post;

            try {
                const response = await fetch(post.file);
                if (!response.ok) {
                    throw new Error('Post not found');
                }
                const markdown = await response.text();
                const content = marked.parse(markdown);

                const html = `
                    <div class="site-header">
                        <a href="#" onclick="renderHome(); return false;" class="back-link">← 返回博客列表</a>
                        <h1>${post.title}</h1>
                        <div class="post-meta">${post.date}</div>
                    </div>
                    <main>
                        <div class="markdown-content">${content}</div>
                    </main>
                    <footer>
                        <p>© <span id="year"></span> 思考空间 • 静水流深</p>
                    </footer>
                `;

                app.innerHTML = html;
                document.getElementById('year').textContent = new Date().getFullYear();

                // Highlight code blocks
                document.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });

                // Update URL hash
                location.hash = '#/' + postId;
            } catch (error) {
                console.error('Error loading post:', error);
                app.innerHTML = `
                    <a href="#" onclick="renderHome(); return false;" class="back-link">← Back to blog</a>
                    <h1>Error</h1>
                    <p>Failed to load post. Please check if the Markdown file exists.</p>
                `;
            }
        }

        // Handle routing
        function handleRoute() {
            const hash = location.hash;
            if (hash.startsWith('#/')) {
                const postId = hash.slice(2);
                if (postId) {
                    loadPost(postId);
                    return;
                }
            }
            renderHome();
        }

        // Initial render
        handleRoute();

        // Listen to hash changes
        window.addEventListener('hashchange', handleRoute);
    </script>
</body>
</html>
