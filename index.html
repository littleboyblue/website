<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Personal Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #ffffff;
            --text-color: #2c3e50;
            --secondary-text: #666666;
            --border-color: #eaecef;
            --hover-bg: #f6f8fa;
            --accent-color: #3498db;
            --code-bg: #f6f8fa;
        }

        body {
            font-family: 'Inter', 'Noto Serif SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.7;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            margin-bottom: 50px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
        }

        .site-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 8px;
            text-decoration: none;
            display: inline-block;
        }

        .site-description {
            font-size: 1.1rem;
            color: var(--secondary-text);
            font-weight: 300;
        }

        nav {
            margin-top: 20px;
        }

        nav a {
            color: var(--secondary-text);
            text-decoration: none;
            margin-right: 24px;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--accent-color);
        }

        .blog-list {
            list-style: none;
        }

        .blog-item {
            padding: 24px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .blog-item:last-child {
            border-bottom: none;
        }

        .blog-item a {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .blog-item:hover {
            background-color: var(--hover-bg);
            margin: 0 -20px;
            padding-left: 20px;
            padding-right: 20px;
            border-radius: 8px;
        }

        .blog-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 8px;
            transition: color 0.2s;
        }

        .blog-item:hover .blog-title {
            color: var(--accent-color);
        }

        .blog-meta {
            font-size: 0.875rem;
            color: var(--secondary-text);
            margin-bottom: 12px;
        }

        .blog-excerpt {
            color: var(--secondary-text);
            font-size: 1rem;
            line-height: 1.6;
        }

        /* Markdown content styles */
        .markdown-content {
            font-family: 'Noto Serif SC', serif;
        }

        .markdown-content h1 {
            font-size: 2.2rem;
            margin: 40px 0 20px;
            font-weight: 600;
        }

        .markdown-content h2 {
            font-size: 1.8rem;
            margin: 35px 0 18px;
            font-weight: 600;
        }

        .markdown-content h3 {
            font-size: 1.4rem;
            margin: 30px 0 15px;
            font-weight: 600;
        }

        .markdown-content p {
            margin-bottom: 18px;
            font-size: 1.1rem;
            line-height: 1.8;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin-bottom: 18px;
            padding-left: 30px;
        }

        .markdown-content li {
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .markdown-content code {
            background-color: var(--code-bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', Menlo, Monaco, Consolas, monospace;
            font-size: 0.9em;
        }

        .markdown-content pre {
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
            margin: 20px 0;
        }

        .markdown-content pre code {
            background: none;
            color: #d4d4d4;
            padding: 0;
        }

        .markdown-content blockquote {
            border-left: 4px solid var(--accent-color);
            padding-left: 16px;
            color: var(--secondary-text);
            margin: 20px 0;
            font-style: italic;
        }

        .markdown-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 20px 0;
        }

        .markdown-content a {
            color: var(--accent-color);
            text-decoration: none;
            border-bottom: 1px solid transparent;
        }

        .markdown-content a:hover {
            border-bottom-color: var(--accent-color);
        }

        .markdown-content table {
            border-collapse: collapse;
            margin: 20px 0;
            width: 100%;
        }

        .markdown-content th,
        .markdown-content td {
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            text-align: left;
        }

        .markdown-content th {
            background-color: var(--hover-bg);
            font-weight: 600;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: var(--secondary-text);
            text-decoration: none;
            font-size: 0.95rem;
        }

        .back-link:hover {
            color: var(--accent-color);
        }

        article header h1 {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        article .post-meta {
            color: var(--secondary-text);
            font-size: 0.95rem;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        footer {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
            text-align: center;
            color: var(--secondary-text);
            font-size: 0.875rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 16px;
            }

            .site-title {
                font-size: 2rem;
            }

            article header h1 {
                font-size: 1.8rem;
            }

            .markdown-content h1 {
                font-size: 1.8rem;
            }

            .markdown-content h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Index page will be rendered here -->
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script>
        // Configure marked
        marked.setOptions({
            highlight: (code, lang) => {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        // Blog configuration
        const blogConfig = {
            title: 'My Blog',
            description: 'Thinking, learning, and sharing',
            posts: [
                {
                    id: 'agent-mcp-skill-intro',
                    title: 'Agent、MCP 和 Skill：AI 智能体的模块化科普',
                    date: '2026年4月10日',
                    excerpt: '用通俗易懂的方式解释 AI 智能体领域的三个核心概念：Agent、MCP 和 Skill，以及它们之间的关系。',
                    file: 'posts/agent-mcp-skill-intro.md'
                },
                {
                    id: 'welcome',
                    title: 'Welcome to My Blog',
                    date: '2026年4月10日',
                    excerpt: 'This is my personal blog where I share thoughts, ideas and experiences. You can easily add new posts by editing Markdown files locally.',
                    file: 'posts/welcome.md'
                }
            ]
        };

        // App state
        let currentPost = null;

        // Elements
        const app = document.getElementById('app');

        // Render home page (blog list)
        function renderHome() {
            let html = `
                <header>
                    <h1 class="site-title">${blogConfig.title}</h1>
                    <p class="site-description">${blogConfig.description}</p>
                </header>
                <main>
                    <ul class="blog-list">
            `;

            blogConfig.posts.forEach(post => {
                html += `
                    <li class="blog-item">
                        <a href="#" onclick="loadPost('${post.id}'); return false;">
                            <h2 class="blog-title">${post.title}</h2>
                            <div class="blog-meta">${post.date}</div>
                            <p class="blog-excerpt">${post.excerpt}</p>
                        </a>
                    </li>
                `;
            });

            html += `
                    </ul>
                </main>
                <footer>
                    <p>© <span id="year"></span> My Blog • Built with plain HTML/JS and Markdown</p>
                </footer>
            `;

            app.innerHTML = html;
            document.getElementById('year').textContent = new Date().getFullYear();
        }

        // Load and render a post
        async function loadPost(postId) {
            const post = blogConfig.posts.find(p => p.id === postId);
            if (!post) return;

            currentPost = post;

            try {
                const response = await fetch(post.file);
                if (!response.ok) {
                    throw new Error('Post not found');
                }
                const markdown = await response.text();
                const content = marked.parse(markdown);

                const html = `
                    <a href="#" onclick="renderHome(); return false;" class="back-link">← Back to blog</a>
                    <article>
                        <header>
                            <h1>${post.title}</h1>
                            <div class="post-meta">${post.date}</div>
                        </header>
                        <div class="markdown-content">${content}</div>
                    </article>
                    <footer>
                        <p>© <span id="year"></span> My Blog • Built with plain HTML/JS and Markdown</p>
                    </footer>
                `;

                app.innerHTML = html;
                document.getElementById('year').textContent = new Date().getFullYear();

                // Highlight code blocks
                document.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });

                // Update URL hash
                location.hash = '#/' + postId;
            } catch (error) {
                console.error('Error loading post:', error);
                app.innerHTML = `
                    <a href="#" onclick="renderHome(); return false;" class="back-link">← Back to blog</a>
                    <h1>Error</h1>
                    <p>Failed to load post. Please check if the Markdown file exists.</p>
                `;
            }
        }

        // Handle routing
        function handleRoute() {
            const hash = location.hash;
            if (hash.startsWith('#/')) {
                const postId = hash.slice(2);
                if (postId) {
                    loadPost(postId);
                    return;
                }
            }
            renderHome();
        }

        // Initial render
        handleRoute();

        // Listen to hash changes
        window.addEventListener('hashchange', handleRoute);
    </script>
</body>
</html>
