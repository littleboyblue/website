#bg-wallpaper {

              color: #333;

              color: #e0e0e0;

        function getPostsSortedByIdDesc() {
            return [...blogConfig.posts].sort((a, b) => {
                const aNum = Number(a.id.replace('post-', ''));
                const bNum = Number(b.id.replace('post-', ''));
                return bNum - aNum;
            });
        }

        const app = document.getElementById('app');
        const homeApp = document.getElementById('home-app');
        const topBar = document.getElementById('top-bar');
        const postLayout = document.getElementById('post-layout');
        const homeWrapper = document.getElementById('home-wrapper');
        const contentArea = document.getElementById('content-area');
        const tocMenu = document.getElementById('toc-menu');
        const moonIcon = document.querySelector('.theme-icon-moon');
        const sunIcon = document.querySelector('.theme-icon-sun');
        const bgWallpaper = document.getElementById('bg-wallpaper');

        let currentPost = null;
        let isDarkMode = localStorage.getItem('dark-mode') === 'true';

        function loadWallpaper() {
            const img = new Image();
            img.onload = function () {
                bgWallpaper.style.backgroundImage = "url('/images/bing-daily.jpg')";
            };
            img.onerror = function () {
                bgWallpaper.style.backgroundImage = 'linear-gradient(135deg, #0f2027, #203a43, #2c5364)';
            };
            img.src = '/images/bing-daily.jpg';
        }

        loadWallpaper();

        function updateThemeUI() {
            if (isDarkMode) {
                moonIcon.style.display = 'none';
                sunIcon.style.display = 'block';
            } else {
                moonIcon.style.display = 'block';
                sunIcon.style.display = 'none';
            }
        }

        function applyTheme() {
            document.body.classList.toggle('dark-mode', isDarkMode);
            updateThemeUI();
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            localStorage.setItem('dark-mode', String(isDarkMode));
            applyTheme();
        }

        function goBack() {
            window.location.hash = '';
        }

        function extractToc(html) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            const headings = tempDiv.querySelectorAll('h1, h2, h3');
            const toc = [];

            headings.forEach((heading, index) => {
                const id = `heading-${index}`;
                heading.id = id;
                toc.push({
                    id: id,
                    text: heading.textContent,
                    level: parseInt(heading.tagName[1], 10)
                });
            });

            return {
                toc: toc,
                html: tempDiv.innerHTML
            };
        }

        function renderToc(toc) {
            tocMenu.innerHTML = '';

            toc.forEach((item) => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = `#${item.id}`;
                a.textContent = item.text;
                a.classList.add(`toc-h${item.level}`);

                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    const target = document.getElementById(item.id);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth' });
                    }

                    tocMenu.querySelectorAll('a').forEach((el) => el.classList.remove('active'));
                    a.classList.add('active');
                });

                li.appendChild(a);
                tocMenu.appendChild(li);
            });
        }

        function setupScrollSpy() {
            contentArea.onscroll = () => {
                const headings = contentArea.querySelectorAll('.markdown-content h1, .markdown-content h2, .markdown-content h3');
                let currentId = null;

                headings.forEach((heading) => {
                    const rect = heading.getBoundingClientRect();
                    if (rect.top <= 100) {
                        currentId = heading.id;
                    }
                });

                if (currentId) {
                    tocMenu.querySelectorAll('a').forEach((a) => {
                        a.classList.toggle('active', a.getAttribute('href') === `#${currentId}`);
                    });
                }
            };
        }

        function renderHome() {
            topBar.style.display = 'none';
            postLayout.style.display = 'none';
            homeWrapper.style.display = 'block';
            document.getElementById('wrapper').style.display = 'block';
            document.getElementById('header').style.display = 'flex';
            document.getElementById('main').style.display = 'block';
            document.getElementById('footer').style.display = 'block';

            // Home always keeps light theme for readability with background wallpaper
            document.body.classList.remove('dark-mode');

            let html = `
                <section>
                    <header class="major">
                        <h2>近期文章</h2>
                    </header>
                    <ul class="blog-list">
            `;

            getPostsSortedByIdDesc().forEach((post) => {
                html += `
                    <li class="blog-item">
                        <a href="#${post.id}" class="post-link" data-post-id="${post.id}">
                            <h3>${post.title}</h3>
                            <div class="blog-meta">${post.date}</div>
                            <p class="blog-excerpt">${post.excerpt}</p>
                        </a>
                    </li>
                `;
            });

            html += '</ul></section>';
            homeApp.innerHTML = DOMPurify.sanitize(html);
            currentPost = null;
        }

        function loadPost(postId) {
            const post = blogConfig.posts.find((p) => p.id === postId);
            if (!post) return;

            topBar.style.display = 'flex';
            postLayout.style.display = 'flex';
            homeWrapper.style.display = 'none';
            document.getElementById('wrapper').style.display = 'none';
            document.getElementById('header').style.display = 'none';
            document.getElementById('main').style.display = 'none';
            document.getElementById('footer').style.display = 'none';

            fetch(post.file)
                .then((response) => response.text())
                .then((content) => {
                    const html = marked.parse(content);
                    const result = extractToc(html);

                    const safeHtml = DOMPurify.sanitize(`
                        <div class="markdown-content">
                            ${result.html}
                        </div>
                    `);
                    app.innerHTML = safeHtml;

                    renderToc(result.toc);
                    setupScrollSpy();

                    currentPost = postId;
                    window.location.hash = `#${postId}`;

                    applyTheme();
                })
                .catch((error) => {
                    const p = document.createElement('p');
                    p.textContent = `Error loading post: ${error.message}`;
                    app.innerHTML = '';
                    app.appendChild(p);
                });
        }

        function handleHashChange() {
            const hash = window.location.hash.slice(1);
            if (hash && /^post-\d{1,4}$/.test(hash)) {
                loadPost(hash);
            } else {
                renderHome();
            }
        }

        window.loadPost = loadPost;
        window.goBack = goBack;
        window.toggleTheme = toggleTheme;

        document.getElementById('year').textContent = new Date().getFullYear();
        window.addEventListener('hashchange', handleHashChange);

        homeApp.addEventListener('click', (e) => {
            const link = e.target.closest('.post-link');
            if (link) {
                e.preventDefault();
                loadPost(link.dataset.postId);
            }
        });

        // Set icon state immediately
        updateThemeUI();
        handleHashChange();
    </script>
