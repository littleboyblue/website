    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script>
        // Configure marked
        marked.setOptions({
            highlight: (code, lang) => {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        // Blog configuration
        const blogConfig = {
            title: '思考空间',
            description: '探索 AI 与技术的深度思考，记录学习与成长',
            posts: [
                {
                    id: 'what-is-skill-how-to-build',
                    title: '什么是skill，如何从0开发一个skill',
                    date: '2026年4月13日',
                    excerpt: '从概念到实战，完整讲解skill是什么，它的价值在哪里，并且一步步教你从零开发一个完整的weather skill。',
                    file: 'posts/what-is-skill-how-to-build.md'
                },
                {
                    id: 'agent-mcp-skill-intro',
                    title: 'Agent、MCP 和 Skill：AI 智能体的模块化科普',
                    date: '2026年4月10日',
                    excerpt: '用通俗易懂的方式解释 AI 智能体领域的三个核心概念：Agent、MCP 和 Skill，以及它们之间的关系，为什么模块化是未来方向。',
                    file: 'posts/agent-mcp-skill-intro.md'
                }
            ]
        };

         // App state
         let currentPost = null;
         let isDarkMode = localStorage.getItem('dark-mode') === 'true';

         // Elements
         const topBar = document.getElementById('top-bar');
         const postLayout = document.getElementById('post-layout');
         const tocSidebar = document.getElementById('toc-sidebar');
         const tocMenu = document.getElementById('toc-menu');
         const contentArea = document.getElementById('content-area');
         const app = document.getElementById('app');
         const homeWrapper = document.getElementById('home-wrapper');
         const homeApp = document.getElementById('home-app');

         // Theme toggle
         function toggleTheme() {
             isDarkMode = !isDarkMode;
             document.body.classList.toggle('dark-mode', isDarkMode);
             localStorage.setItem('dark-mode', isDarkMode);
         }

         // Initialize theme
         if (isDarkMode) {
             document.body.classList.add('dark-mode');
         }

         // Go back to home
         function goBack() {
             renderHome();
         }

         // Extract table of contents from markdown content
         function extractToc(html) {
             const tempDiv = document.createElement('div');
             tempDiv.innerHTML = html;

             const headings = tempDiv.querySelectorAll('h1, h2, h3');
             let toc = [];

             headings.forEach((heading, index) => {
                 const id = `heading-${index}`;
                 heading.id = id;
                 toc.push({
                     id: id,
                     text: heading.textContent,
                     level: parseInt(heading.tagName[1])
                 });
             });

             return toc;
         }

         // Render TOC
         function renderToc(toc) {
             tocMenu.innerHTML = '';

             toc.forEach(item => {
                 const li = document.createElement('li');
                 const a = document.createElement('a');
                 a.href = `#${item.id}`;
                 a.textContent = item.text;
                 a.classList.add(`toc-h${item.level}`);

                 a.addEventListener('click', (e) => {
                     e.preventDefault();
                     const target = document.getElementById(item.id);
                     if (target) {
                         target.scrollIntoView({behavior: 'smooth'});
                     }

                     // Highlight active
                     tocMenu.querySelectorAll('a').forEach(el => el.classList.remove('active'));
                     a.classList.add('active');
                 });

                 li.appendChild(a);
                 tocMenu.appendChild(li);
             });
         }

         // Scroll spy for TOC
         function setupScrollSpy() {
             contentArea.addEventListener('scroll', () => {
                 const headings = contentArea.querySelectorAll('h1, h2, h3');
                 let currentId = null;

                 headings.forEach(heading => {
                     const rect = heading.getBoundingClientRect();
                     if (rect.top <= 100) {
                         currentId = heading.id;
                     }
                 });

                 if (currentId) {
                     tocMenu.querySelectorAll('a').forEach(a => {
                         a.classList.toggle('active', a.getAttribute('href') === `#${currentId}`);
                     });
                 }
             });
         }

         // Render home page (blog list)
          function renderHome() {
              // Show home, hide post layout
              topBar.style.display = 'none';
              postLayout.style.display = 'none';
              homeWrapper.style.display = 'block';
              document.getElementById('wrapper').style.display = 'block';
              document.getElementById('header').style.display = 'flex';
              document.getElementById('main').style.display = 'block';
              document.getElementById('footer').style.display = 'block';

              let html = `
                  <section>
                      <header class="major">
                          <h2>近期文章</h2>
                      </header>
                      <ul class="blog-list">
              `;

              [...blogConfig.posts].sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(post => {
                  html += `
                      <li class="blog-item">
                          <a href="#" onclick="loadPost('${post.id}'); return false;">
                              <h3>${post.title}</h3>
                              <div class="blog-meta">${post.date}</div>
                              <p class="blog-excerpt">${post.excerpt}</p>
                          </a>
                      </li>
                  `;
              });

              html += `</ul></section>`;
              homeApp.innerHTML = html;
              currentPost = null;
              window.location.hash = '';
          }

          // Load and render a post
          function loadPost(postId) {
              const post = blogConfig.posts.find(p => p.id === postId);
              if (!post) return;

              // Hide home, show post layout
              topBar.style.display = 'flex';
              postLayout.style.display = 'flex';
              homeWrapper.style.display = 'none';
              document.getElementById('wrapper').style.display = 'none';
              document.getElementById('header').style.display = 'none';
              document.getElementById('main').style.display = 'none';
              document.getElementById('footer').style.display = 'none';

              fetch(post.file)
                  .then(response => response.text())
                  .then(content => {
                      const html = marked.parse(content);

                      // Extract TOC before rendering
                      const toc = extractToc(html);
                      renderToc(toc);
                      setupScrollSpy();

                      app.innerHTML = `
                          <div class="markdown-content">
                              ${html}
                          </div>
                      `;
                      currentPost = postId;
                      window.location.hash = `#${postId}`;

                      // Highlight code blocks
                      document.querySelectorAll('pre code').forEach((block) => {
                          hljs.highlightBlock(block);
                      });
                  })
                  .catch(error => {
                      app.innerHTML = `<p>Error loading post: ${error.message}</p>`;
                  });
          }

          // Handle hash change
          function handleHashChange() {
              const hash = window.location.hash.slice(1);
              if (hash) {
                  loadPost(hash);
              } else {
                  renderHome();
              }
          }

          // Expose functions globally
          window.loadPost = loadPost;
          window.goBack = goBack;
          window.toggleTheme = toggleTheme;

          // Init
          document.getElementById('year').textContent = new Date().getFullYear();
          window.addEventListener('hashchange', handleHashChange);

          // Check if we have a hash on load
          handleHashChange();
    </script>
</body>
</html>
