<!DOCTYPE HTML>
<html>
<head>
    <title>思考空间 - 探索 AI 与技术</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:300,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f4f4;
            font-family: 'Source Sans Pro', sans-serif;
            font-weight: 300;
            color: #666;
            line-height: 1.8;
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 400;
            color: #444;
        }

        a {
            color: #000;
            text-decoration: none;
            border-bottom: dotted 1px rgba(0, 0, 0, 0.25);
        }

        a:hover {
            color: #f2849e;
            border-bottom: none;
        }

        header {
            text-align: center;
            background: #fff;
            padding: 50px 2em 1em 2em;
        }

        .avatar {
            border-radius: 100%;
            overflow: hidden;
            display: inline-block;
            margin-bottom: 1.5em;
        }

        .avatar img {
            display: block;
            width: 100px;
            height: 100px;
            border-radius: 100%;
        }

        header h1 {
            font-size: 1.5em;
            line-height: 1.5;
            margin-bottom: 0;
        }

        header h1 strong {
            color: #000;
            font-weight: 400;
        }

        #header {
            padding-top: 0;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 2em;
        }

        #main {
            background: #fff;
            padding: 3em 2em;
        }

        section {
            margin-bottom: 3em;
        }

        section:last-child {
            margin-bottom: 0;
        }

        .major {
            margin-bottom: 2em;
        }

        .major h2 {
            font-size: 1.8em;
            line-height: 1.5;
            color: #000;
        }

        p {
            margin-bottom: 1.5em;
        }

        .actions {
            list-style: none;
        }

        .actions li {
            display: inline-block;
        }

        .button {
            appearance: none;
            display: inline-block;
            border-radius: 0.35em;
            border: 1px solid rgba(0, 0, 0, 0.25);
            color: #000;
            text-decoration: none;
            padding: 0.75em 2em;
            transition: background-color 0.2s ease-in-out, color 0.2s ease-in-out, border-color 0.2s ease-in-out;
        }

        .button:hover {
            background: #f2849e;
            border-color: #f2849e;
            color: #fff;
        }

        .blog-list {
            list-style: none;
        }

        .blog-item {
            padding: 2em 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .blog-item:first-child {
            padding-top: 0;
        }

        .blog-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .blog-item a {
            border-bottom: none;
        }

        .blog-item h3 {
            font-size: 1.5em;
            color: #000;
            margin-bottom: 0.5em;
        }

        .blog-meta {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 1em;
        }

        .blog-excerpt {
            font-size: 1.1em;
        }

        .blog-item:hover h3 {
            color: #f2849e;
        }

        /* Article styles */
        .back-link {
            display: inline-block;
            margin-bottom: 2em;
        }

        article h1 {
            font-size: 2.5em;
            color: #000;
            margin-bottom: 0.5em;
        }

        .post-meta {
            color: #999;
            margin-bottom: 2.5em;
            padding-bottom: 1em;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        /* Markdown styles */
        .markdown-content {
            font-size: 1.15em;
        }

        .markdown-content h1 {
            font-size: 2.2em;
            margin: 1.5em 0 0.8em;
            color: #000;
        }

        .markdown-content h2 {
            font-size: 1.8em;
            margin: 1.4em 0 0.7em;
            color: #000;
        }

        .markdown-content h3 {
            font-size: 1.5em;
            margin: 1.3em 0 0.6em;
            color: #000;
        }

        .markdown-content p {
            margin-bottom: 1.2em;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin-bottom: 1.2em;
            padding-left: 2em;
        }

        .markdown-content li {
            margin-bottom: 0.5em;
        }

        .markdown-content code {
            background: #f4f4f4;
            padding: 0.2em 0.4em;
            border-radius: 0.2em;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .markdown-content pre {
            background: #1e1e1e;
            border-radius: 0.35em;
            padding: 1.2em;
            overflow-x: auto;
            margin: 1.5em 0;
        }

        .markdown-content pre code {
            background: none;
            color: #d4d4d4;
            padding: 0;
        }

        .markdown-content blockquote {
            border-left: 4px solid #f2849e;
            padding-left: 1em;
            color: #888;
            margin: 1.5em 0;
            font-style: italic;
        }

        .markdown-content img {
            max-width: 100%;
            border-radius: 0.35em;
            margin: 1.5em 0;
        }

        .markdown-content a {
            color: #f2849e;
        }

        .markdown-content table {
            border-collapse: collapse;
            margin: 1.5em 0;
            width: 100%;
        }

        .markdown-content th,
        .markdown-content td {
            border: 1px solid #ddd;
            padding: 0.8em 1em;
            text-align: left;
        }

        .markdown-content th {
            background: #f9f9f9;
            font-weight: 400;
        }

        footer {
            text-align: center;
            padding: 3em 0 2em;
            font-size: 0.9em;
            color: #999;
        }

        footer ul {
            list-style: none;
            margin-bottom: 1.5em;
        }

        footer ul li {
            display: inline-block;
            padding: 0 1em;
        }

        footer ul li a {
            color: #666;
        }

        footer ul li a:hover {
            color: #f2849e;
        }

        .copyright {
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            padding-top: 2em;
            margin-top: 2em;
        }

        @media screen and (max-width: 736px) {
            body {
                background: #fff;
            }

            .container {
                padding: 0 1em;
            }

            #header {
                padding: 3em 1em 1em;
            }

            #main {
                padding: 2em 1em;
            }

            article h1 {
                font-size: 2em;
            }

            .avatar img {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>
    <header id="header">
        <div class="avatar">
            <img src="https://cdn.jsdelivr.net/gh/ident/hugo-coder-portfolio@master/images/avatar.jpg" alt="Avatar" />
        </div>
        <h1><strong>思考空间</strong><br>
        探索 AI 与技术的深度思考</h1>
    </header>

    <div id="main" class="container">
        <div id="app">
            <!-- Content will be rendered here -->
        </div>

        <footer>
            <div class="copyright">
                <p>&copy; <span id="year"></span> 思考空间 • <a href="https://washi.lol">washi.lol</a></p>
            </div>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script>
        // Configure marked
        marked.setOptions({
            highlight: (code, lang) => {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        // Blog configuration
        const blogConfig = {
            title: '思考空间',
            description: '探索 AI 与技术的深度思考，记录学习与成长',
            posts: [
                {
                    id: 'agent-mcp-skill-intro',
                    title: 'Agent、MCP 和 Skill：AI 智能体的模块化科普',
                    date: '2026年4月10日',
                    excerpt: '用通俗易懂的方式解释 AI 智能体领域的三个核心概念：Agent、MCP 和 Skill，以及它们之间的关系，为什么模块化是未来方向。',
                    file: 'posts/agent-mcp-skill-intro.md'
                }
            ]
        };

        // App state
        let currentPost = null;

        // Elements
        const app = document.getElementById('app');

        // Render home page (blog list)
        function renderHome() {
            let html = `
                <section>
                    <header class="major">
                        <h2>近期文章</h2>
                    </header>
                    <ul class="blog-list">
            `;

            blogConfig.posts.forEach(post => {
                html += `
                    <li class="blog-item">
                        <a href="#" onclick="loadPost('${post.id}'); return false;">
                            <h3>${post.title}</h3>
                            <div class="blog-meta">${post.date}</div>
                            <p class="blog-excerpt">${post.excerpt}</p>
                        </a>
                    </li>
                `;
            });

            html += `
                    </ul>
                </section>
            `;

            app.innerHTML = html;
            document.getElementById('year').textContent = new Date().getFullYear();
        }

        // Load and render a post
        async function loadPost(postId) {
            const post = blogConfig.posts.find(p => p.id === postId);
            if (!post) return;

            currentPost = post;

            try {
                const response = await fetch(post.file);
                if (!response.ok) {
                    throw new Error('Post not found');
                }
                const markdown = await response.text();
                const content = marked.parse(markdown);

                const html = `
                    <article>
                        <a href="#" onclick="renderHome(); return false;" class="back-link">← 返回文章列表</a>
                        <header>
                            <h1>${post.title}</h1>
                            <div class="post-meta">${post.date}</div>
                        </header>
                        <div class="markdown-content">${content}</div>
                    </article>
                `;

                app.innerHTML = html;
                document.getElementById('year').textContent = new Date().getFullYear();

                // Highlight code blocks
                document.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });

                // Update URL hash
                location.hash = '#/' + postId;
            } catch (error) {
                console.error('Error loading post:', error);
                app.innerHTML = `
                    <a href="#" onclick="renderHome(); return false;" class="back-link">← 返回博客</a>
                    <h1>Error</h1>
                    <p>Failed to load post. Please check if the Markdown file exists.</p>
                `;
            }
        }

        // Handle routing
        function handleRoute() {
            const hash = location.hash;
            if (hash.startsWith('#/')) {
                const postId = hash.slice(2);
                if (postId) {
                    loadPost(postId);
                    return;
                }
            }
            renderHome();
        }

        // Initial render
        handleRoute();

        // Listen to hash changes
        window.addEventListener('hashchange', handleRoute);

        // Set year
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
